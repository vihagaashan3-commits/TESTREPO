$kind: http-request
description: |-
  

  **Auth:** ROLE_GARAGE_OWNER (one garage per account)
url: "{{baseUrl}}/garages/new"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
body:
  type: urlencoded
  content:
    - key: garageName
      value: Kamal Auto Care
    - key: address
      value: 123 Main St, Colombo
    - key: phone
      value: "0112345678"
    - key: email
      value: kamal@garage.com
    - key: latitude
      value: "6.9271"
    - key: longitude
      value: "79.8612"
    - key: openingTime
      value: 08:00
    - key: closingTime
      value: 18:00
    - key: services
      value: FLAT_TIRE
      description: Repeat key for multiple ServiceType values
order: 6000
