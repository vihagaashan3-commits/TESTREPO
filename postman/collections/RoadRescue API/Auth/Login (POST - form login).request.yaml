$kind: http-request
description: Spring Security form login. On success sets JSESSIONID + XSRF-TOKEN
  cookies used by every other request in this collection.
url: "{{baseUrl}}/auth/login"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
body:
  type: urlencoded
  content:
    - key: email
      value: nimal@gmail.com
      description: Registered user email
    - key: password
      value: user123
      description: Account password
examples: .resources/Login (POST - form login).resources/examples
order: 2000
