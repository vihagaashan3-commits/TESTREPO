$kind: http-request
description: |-
  

  **Auth:** ROLE_USER
url: "{{baseUrl}}/reviews/new"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
body:
  type: urlencoded
  content:
    - key: garageId
      value: "1"
    - key: requestId
      value: "1"
    - key: rating
      value: "5"
      description: 1-5
    - key: comment
      value: Great job fixing my car.
order: 4000
