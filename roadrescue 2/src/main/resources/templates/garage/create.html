<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Garage | RoadRescue</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <style>#map { height: 300px; border-radius: 12px; z-index: 0; }</style>
</head>
<body class="bg-light">
<th:block th:replace="~{layout :: navbar}"></th:block>

<div class="container my-4">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="d-flex align-items-center mb-4 gap-2">
                <a th:href="@{/garages}" class="btn btn-outline-secondary btn-sm">
                    <i class="fas fa-arrow-left"></i>
                </a>
                <h5 class="mb-0 fw-bold"><i class="fas fa-warehouse text-danger me-2"></i>Register Your Garage</h5>
            </div>

            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <form th:action="@{/garages/new}" th:object="${garageDTO}" method="post" novalidate>
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                        <div class="row g-3">
                            <!-- Garage Name -->
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Garage Name *</label>
                                <input type="text" th:field="*{garageName}" class="form-control"
                                       th:classappend="${#fields.hasErrors('garageName')} ? 'is-invalid'"
                                       placeholder="e.g. City Auto Repair">
                                <div class="invalid-feedback" th:errors="*{garageName}"></div>
                            </div>

                            <!-- Phone -->
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Phone Number *</label>
                                <input type="tel" th:field="*{phone}" class="form-control"
                                       th:classappend="${#fields.hasErrors('phone')} ? 'is-invalid'"
                                       placeholder="0112345678">
                                <div class="invalid-feedback" th:errors="*{phone}"></div>
                            </div>

                            <!-- Email -->
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Email Address</label>
                                <input type="email" th:field="*{email}" class="form-control"
                                       placeholder="garage@email.com">
                            </div>

                            <!-- Address -->
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Address *</label>
                                <input type="text" th:field="*{address}" class="form-control"
                                       th:classappend="${#fields.hasErrors('address')} ? 'is-invalid'"
                                       placeholder="Street, City">
                                <div class="invalid-feedback" th:errors="*{address}"></div>
                            </div>

                            <!-- Opening / Closing -->
                            <div class="col-md-3">
                                <label class="form-label fw-semibold">Opening Time</label>
                                <input type="time" th:field="*{openingTime}" class="form-control">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label fw-semibold">Closing Time</label>
                                <input type="time" th:field="*{closingTime}" class="form-control">
                            </div>

                            <!-- Hidden lat/lng set by map -->
                            <input type="hidden" th:field="*{latitude}" id="latInput">
                            <input type="hidden" th:field="*{longitude}" id="lngInput">

                            <!-- Services -->
                            <div class="col-12">
                                <label class="form-label fw-semibold">Services Offered *</label>
                                <div th:if="${#fields.hasErrors('services')}"
                                     class="alert alert-danger py-2 small" th:errors="*{services}"></div>
                                <div class="row g-2">
                                    <div class="col-md-4 col-6" th:each="svc : ${serviceTypes}">
                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox"
                                                   name="services" th:value="${svc.name()}"
                                                   th:id="${'svc_' + svc.name()}"
                                                   th:checked="${garageDTO.services != null and garageDTO.services.contains(svc)}">
                                            <label class="form-check-label small"
                                                   th:for="${'svc_' + svc.name()}"
                                                   th:text="${svc.displayName}">Service</label>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- Map (Leaflet — no API key needed) -->
                            <div class="col-12">
                                <label class="form-label fw-semibold">
                                    Pin Your Garage Location *
                                    <small class="text-muted fw-normal">(click on map or use button)</small>
                                </label>
                                <div class="mb-2">
                                    <button type="button" class="btn btn-sm btn-outline-danger" onclick="useMyLocation()">
                                        <i class="fas fa-crosshairs me-1"></i>Use My Location
                                    </button>
                                </div>
                                <div id="map"></div>
                                <div id="coordDisplay" class="mt-2 small text-muted"></div>
                                <div id="locationError" class="alert alert-danger py-2 small mt-2 d-none">
                                    Please pin your garage location on the map.
                                </div>
                            </div>

                            <!-- Submit -->
                            <div class="col-12">
                                <button type="button" class="btn btn-danger px-5" onclick="submitForm()">
                                    <i class="fas fa-warehouse me-2"></i>Register Garage
                                </button>
                                <a th:href="@{/garages}" class="btn btn-outline-secondary ms-2">Cancel</a>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block th:replace="~{layout :: footer}"></th:block>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let map, marker;

    // Init Leaflet map centered on Colombo
    map = L.map('map').setView([6.9271, 79.8612], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    // Click on map to pin location
    map.on('click', function(e) {
        placeMarker(e.latlng.lat, e.latlng.lng);
    });

    function useMyLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                function(pos) { placeMarker(pos.coords.latitude, pos.coords.longitude); },
                function() { alert('Could not get your location. Please click on the map.'); }
            );
        }
    }

    function placeMarker(lat, lng) {
        document.getElementById('latInput').value = lat;
        document.getElementById('lngInput').value = lng;
        document.getElementById('coordDisplay').innerHTML =
            '<i class="fas fa-map-marker-alt text-danger me-1"></i>Pinned: ' +
            lat.toFixed(5) + ', ' + lng.toFixed(5);
        document.getElementById('locationError').classList.add('d-none');

        map.setView([lat, lng], 15);
        if (marker) marker.remove();
        marker = L.marker([lat, lng]).addTo(map)
            .bindPopup('Your Garage Location').openPopup();
    }

    function submitForm() {
        if (!document.getElementById('latInput').value) {
            document.getElementById('locationError').classList.remove('d-none');
            document.getElementById('map').scrollIntoView({ behavior: 'smooth' });
            return;
        }
        document.querySelector('form').submit();
    }
</script>
</body>
</html>
