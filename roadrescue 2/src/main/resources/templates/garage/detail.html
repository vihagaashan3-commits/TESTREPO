<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <title th:text="${garage.garageName + ' | RoadRescue'}">Garage | RoadRescue</title>
    <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <style>
        #garageMap { height: 250px; border-radius: 12px; }
        .star-filled { color: #ffc107; }
        .star-empty { color: #dee2e6; }
    </style>
</head>
<body class="bg-light">
<th:block th:replace="~{layout :: navbar}"></th:block>

<div class="container my-4">
    <div class="d-flex align-items-center mb-4 gap-2">
        <a th:href="@{/garages}" class="btn btn-outline-secondary btn-sm">
            <i class="fas fa-arrow-left"></i>
        </a>
        <h5 class="mb-0 fw-bold" th:text="${garage.garageName}">Garage</h5>
        <span th:if="${garage.verified}" class="badge bg-success">
            <i class="fas fa-check-circle me-1"></i>Verified
        </span>
        <span th:unless="${garage.verified}" class="badge bg-warning text-dark">Pending Verification</span>
    </div>

    <div class="row g-4">
        <!-- Left -->
        <div class="col-lg-4">
            <!-- Info Card -->
            <div class="card border-0 shadow-sm mb-4">
                <div class="card-header rr-hero text-white py-3">
                    <div class="d-flex align-items-center gap-3">
                        <div class="rounded-circle bg-white bg-opacity-25 p-3">
                            <i class="fas fa-warehouse fs-4"></i>
                        </div>
                        <div>
                            <div class="fw-bold" th:text="${garage.garageName}">Name</div>
                            <div class="small opacity-75">
                                <span class="me-2">⭐ <span th:text="${avgRating}">N/A</span></span>
                                <span th:class="${garage.available} ? 'text-success' : 'text-warning'"
                                      th:text="${garage.available} ? '● Available' : '● Busy'">Status</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="card-body">
                    <ul class="list-unstyled mb-0">
                        <li class="mb-2">
                            <i class="fas fa-map-marker-alt text-danger me-2"></i>
                            <span th:text="${garage.address}">Address</span>
                        </li>
                        <li class="mb-2">
                            <i class="fas fa-phone text-success me-2"></i>
                            <a th:href="'tel:' + ${garage.phone}" th:text="${garage.phone}" class="text-decoration-none">Phone</a>
                        </li>
                        <li class="mb-2" th:if="${garage.email}">
                            <i class="fas fa-envelope text-info me-2"></i>
                            <span th:text="${garage.email}">Email</span>
                        </li>
                        <li class="mb-2" th:if="${garage.openingTime}">
                            <i class="fas fa-clock text-warning me-2"></i>
                            <span th:text="${garage.openingTime + ' – ' + garage.closingTime}">Hours</span>
                        </li>
                    </ul>
                </div>
            </div>

            <!-- Services -->
            <div class="card border-0 shadow-sm mb-4">
                <div class="card-header bg-white fw-bold">
                    <i class="fas fa-tools text-danger me-2"></i>Services Offered
                </div>
                <div class="card-body">
                    <div class="d-flex flex-wrap gap-2">
                        <span th:each="svc : ${garage.services}"
                              class="badge bg-danger bg-opacity-10 text-danger border border-danger-subtle px-3 py-2"
                              th:text="${#strings.replace(svc.name(), '_', ' ')}">Service</span>
                    </div>
                </div>
            </div>

            <!-- Actions -->
            <div class="d-grid gap-2">
                <a th:href="@{/requests/new}" sec:authorize="hasRole('USER')"
                   class="btn btn-danger">
                    <i class="fas fa-exclamation-triangle me-2"></i>Request Help from This Garage
                </a>
                <a th:href="@{/garages/{id}/edit(id=${garage.id})}"
                   sec:authorize="hasAnyRole('GARAGE_OWNER', 'ADMIN')"
                   class="btn btn-outline-warning">
                    <i class="fas fa-edit me-2"></i>Edit Garage
                </a>
                <form th:action="@{/garages/{id}/toggle-availability(id=${garage.id})}"
                      method="post" sec:authorize="hasRole('GARAGE_OWNER')">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-outline-secondary w-100">
                        <i class="fas fa-toggle-on me-2"></i>
                        <span th:text="${garage.available} ? 'Mark as Busy' : 'Mark as Available'">Toggle</span>
                    </button>
                </form>
                <form th:action="@{/admin/garages/{id}/verify(id=${garage.id})}"
                      method="post" sec:authorize="hasRole('ADMIN')" th:unless="${garage.verified}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-success w-100">
                        <i class="fas fa-check-circle me-2"></i>Verify Garage
                    </button>
                </form>
            </div>
        </div>

        <!-- Right -->
        <div class="col-lg-8">
            <!-- Map -->
            <div class="card border-0 shadow-sm mb-4" th:if="${garage.latitude != null}">
                <div class="card-header bg-white fw-bold">
                    <i class="fas fa-map text-danger me-2"></i>Location on Map
                </div>
                <div class="card-body p-2">
                    <div id="garageMap"></div>
                </div>
            </div>

            <!-- Technicians -->
            <div class="card border-0 shadow-sm mb-4" th:if="${garage.technicians != null and !garage.technicians.isEmpty()}">
                <div class="card-header bg-white fw-bold">
                    <i class="fas fa-hard-hat text-warning me-2"></i>Our Technicians
                </div>
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-6" th:each="tech : ${garage.technicians}" th:unless="${tech.deleted}">
                            <div class="d-flex align-items-center gap-3 p-3 rounded bg-light">
                                <div class="rounded-circle bg-secondary text-white d-flex align-items-center justify-content-center"
                                     style="width:45px;height:45px;font-size:1.2rem">
                                    <i class="fas fa-user-hard-hat"></i>
                                </div>
                                <div>
                                    <div class="fw-semibold small" th:text="${tech.name}">Name</div>
                                    <small class="text-muted" th:text="${tech.experienceYears + ' years exp.'}">Exp</small>
                                    <div>
                                        <span th:class="${tech.available} ? 'badge bg-success' : 'badge bg-secondary'"
                                              th:text="${tech.available} ? 'Available' : 'Busy'">Status</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Reviews -->
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white fw-bold d-flex justify-content-between align-items-center">
                    <span><i class="fas fa-star text-warning me-2"></i>Customer Reviews</span>
                    <a th:href="@{/reviews/garage/{id}(id=${garage.id})}"
                       th:if="${loggedUserUsername != null && loggedUserUsername != garage.user.username}"
                       class="btn btn-sm btn-outline-warning">
                        Write a Review
                    </a>
                </div>
                <div class="card-body">
                    <div th:if="${garage.reviews == null or garage.reviews.isEmpty()}"
                         class="text-center text-muted py-3">
                        <i class="fas fa-comment-slash mb-2 d-block"></i>
                        No reviews yet. Be the first!
                    </div>
                    <div th:each="review : ${garage.reviews}" th:unless="${review.deleted}"
                         class="border-bottom pb-3 mb-3">
                        <div class="d-flex justify-content-between align-items-start">
                            <div>
                                <div class="fw-semibold" th:text="${review.user.fullName}">User</div>
                                <div>
                                    <i th:each="s : ${#numbers.sequence(1, 5)}"
                                       th:class="${s <= review.rating} ? 'fas fa-star star-filled' : 'fas fa-star star-empty'"></i>
                                </div>
                            </div>
                            <small class="text-muted"
                                   th:text="${#temporals.format(review.createdAt, 'dd MMM yyyy')}">Date</small>
                        </div>
                        <p class="small mt-2 mb-0 text-muted" th:text="${review.comment}">Comment</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block th:replace="~{layout :: footer}"></th:block>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    const garageLat = /*[[${garage.latitude}]]*/ null;
    const garageLng = /*[[${garage.longitude}]]*/ null;
    const garageName = /*[[${garage.garageName}]]*/ 'Garage';

    function initMap() {
        if (!garageLat || !garageLng) return;
        const pos = { lat: garageLat, lng: garageLng };
        const map = new google.maps.Map(document.getElementById('garageMap'), { zoom: 15, center: pos });
        new google.maps.Marker({ position: pos, map, title: garageName });
    }
</script>
<script th:src="@{'https://maps.googleapis.com/maps/api/js?key=' + ${@environment.getProperty('google.maps.api.key')} + '&callback=initMap'}"
        async defer></script>
</body>
</html>
