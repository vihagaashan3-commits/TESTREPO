<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <title th:text="${'Contact Customer | RoadRescue'}">Contact Customer | RoadRescue</title>
    <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-light">
<th:block th:replace="~{layout :: navbar}"></th:block>

<div class="container my-4">
    <div class="d-flex align-items-center mb-4 gap-2">
        <a th:href="@{/garages/{id}(id=${garage.id})}" class="btn btn-outline-secondary btn-sm">
            <i class="fas fa-arrow-left"></i>
        </a>
        <h5 class="mb-0 fw-bold">
            Contact a Customer — <span th:text="${garage.garageName}">Garage</span>
        </h5>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white fw-bold">
                    <i class="fas fa-paper-plane text-danger me-2"></i>Send a Message
                </div>
                <div class="card-body">
                    <form th:action="@{/garages/{id}/contact-customer(id=${garage.id})}" method="post"
                          th:object="${contactCustomerDTO}">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                        <div class="mb-3">
                            <label for="customerEmail" class="form-label">Customer's Email</label>
                            <input type="email" id="customerEmail" th:field="*{customerEmail}" class="form-control"
                                   required placeholder="customer@example.com">
                        </div>

                        <div class="mb-3">
                            <label for="subject" class="form-label">Subject</label>
                            <input type="text" id="subject" th:field="*{subject}" class="form-control"
                                   maxlength="150" required placeholder="e.g. Update on your request">
                        </div>

                        <div class="mb-3">
                            <label for="message" class="form-label">Message</label>
                            <textarea id="message" th:field="*{message}" class="form-control" rows="6"
                                      maxlength="2000" required
                                      placeholder="Type your message to the customer..."></textarea>
                        </div>

                        <button type="submit" class="btn btn-danger">
                            <i class="fas fa-paper-plane me-2"></i>Send Message
                        </button>
                        <a th:href="@{/garages/{id}(id=${garage.id})}" class="btn btn-outline-secondary">
                            Cancel
                        </a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block th:replace="~{layout :: footer}"></th:block>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
