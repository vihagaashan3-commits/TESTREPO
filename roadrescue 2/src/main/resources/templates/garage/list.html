<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garages | RoadRescue</title>
    <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <style>
        .service-badge{ font-size:.7rem; }
        .garage-card{ position:relative; }
        .garage-card .card-header{
            background:linear-gradient(135deg,var(--rr-ink) 0%,var(--rr-ink-2) 100%);
            border-bottom:none;
            padding:1.1rem 1.25rem;
        }
        .garage-avatar{
            width:46px; height:46px;
            border-radius:12px;
            display:flex; align-items:center; justify-content:center;
            background:rgba(255,255,255,.12);
            color:white; font-size:1.15rem;
            flex-shrink:0;
        }
        .garage-status-pill{
            display:inline-flex; align-items:center; gap:.35rem;
            font-size:.7rem; font-weight:700; letter-spacing:.02em;
            padding:.22rem .6rem; border-radius:20px;
        }
        .garage-status-pill.is-available{ background:rgba(21,128,61,.22); color:#8fe3ac; }
        .garage-status-pill.is-busy{ background:rgba(180,83,9,.22); color:#f7c887; }
        .garage-status-pill i{ font-size:.5rem; }
        .garage-verified-pill{
            background:rgba(255,255,255,.15);
            color:white;
            font-weight:700;
            font-size:.68rem;
            border:1px solid rgba(255,255,255,.25);
        }
        .garage-meta-row{ display:flex; align-items:flex-start; gap:.65rem; }
        .garage-meta-icon{
            width:30px; height:30px; border-radius:8px;
            display:flex; align-items:center; justify-content:center;
            font-size:.8rem; flex-shrink:0; margin-top:1px;
        }
        .garage-meta-icon.loc{ background:var(--rr-red-soft); color:var(--rr-red-dark); }
        .garage-meta-icon.tel{ background:var(--rr-success-soft); color:var(--rr-success); }
        .garage-meta-icon.time{ background:var(--rr-info-soft); color:var(--rr-info); }
        .rr-page-icon{
            width:52px; height:52px; border-radius:14px;
            display:flex; align-items:center; justify-content:center;
            background:var(--rr-red); color:white; font-size:1.3rem;
            box-shadow:0 6px 16px rgba(224,48,58,.3);
        }
    </style>
</head>
<body class="bg-light">
<th:block th:replace="~{layout :: navbar}"></th:block>

<div class="container py-4">

    <div class="d-flex align-items-center gap-3 mb-4">
        <div class="rr-page-icon"><i class="fas fa-warehouse"></i></div>
        <div>
            <h5 class="fw-bold mb-0">Find a Garage</h5>
            <p class="text-muted small mb-0">Browse trusted garages and book the service you need</p>
        </div>
    </div>

    <!-- Search & Filter -->
    <div class="card border-0 shadow-sm mb-4">
        <div class="card-body">
            <form th:action="@{/garages}" method="get" class="row g-3 align-items-end">
                <div class="col-md-6">
                    <label class="form-label small fw-semibold">Search Garages</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-search"></i></span>
                        <input type="text" name="keyword" th:value="${keyword}"
                               class="form-control" placeholder="Garage name or address...">
                    </div>
                </div>
                <div class="col-md-4">
                    <label class="form-label small fw-semibold">Filter by Service</label>
                    <select name="serviceType" class="form-select">
                        <option value="">All Services</option>
                        <option th:each="svc : ${serviceTypes}"
                                th:value="${svc.name()}"
                                th:text="${#strings.replace(svc.name(), '_', ' ')}">Service</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-danger w-100">
                        <i class="fas fa-search me-1"></i>Search
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Results Count -->
    <p class="text-muted small mb-3">
        Showing <strong th:text="${garages.numberOfElements}">0</strong>
        of <strong th:text="${garages.totalElements}">0</strong> garages
        <span th:if="${keyword != null and !keyword.isEmpty()}">
            for "<strong th:text="${keyword}"></strong>"
        </span>
    </p>

    <!-- Garage Cards -->
    <div th:if="${garages.isEmpty()}" class="text-center py-5 text-muted">
        <i class="fas fa-warehouse fs-1 mb-3 d-block opacity-50"></i>
        <h6>No garages found</h6>
    </div>

    <div class="row g-4" th:unless="${garages.isEmpty()}">
        <div class="col-md-6 col-lg-4" th:each="garage : ${garages.content}">
            <div class="card border-0 shadow-sm garage-card hover-lift h-100">
                <!-- Header -->
                <div class="card-header text-white d-flex align-items-center gap-2">
                    <div class="garage-avatar">
                        <i class="fas fa-warehouse"></i>
                    </div>
                    <div class="flex-grow-1">
                        <div class="fw-bold" th:text="${garage.garageName}">Garage</div>
                        <span class="garage-status-pill mt-1"
                              th:classappend="${garage.available} ? 'is-available' : 'is-busy'">
                            <i class="fas fa-circle"></i>
                            <span th:text="${garage.available} ? 'Available' : 'Busy'">Status</span>
                        </span>
                    </div>
                    <div th:if="${garage.verified}">
                        <span class="badge garage-verified-pill"><i class="fas fa-check-circle me-1"></i>Verified</span>
                    </div>
                </div>

                <div class="card-body">
                    <div class="garage-meta-row mb-2">
                        <span class="garage-meta-icon loc"><i class="fas fa-map-marker-alt"></i></span>
                        <span class="small text-muted" th:text="${garage.address}">Address</span>
                    </div>
                    <div class="garage-meta-row mb-2">
                        <span class="garage-meta-icon tel"><i class="fas fa-phone"></i></span>
                        <span class="small text-muted" th:text="${garage.phone}">Phone</span>
                    </div>
                    <div class="garage-meta-row mb-3" th:if="${garage.openingTime != null}">
                        <span class="garage-meta-icon time"><i class="fas fa-clock"></i></span>
                        <span class="small text-muted" th:text="${garage.openingTime + ' - ' + garage.closingTime}">Hours</span>
                    </div>

                    <!-- Services -->
                    <div class="mb-1">
                        <span th:each="svc, iter : ${garage.services}"
                              th:if="${iter.index < 4}"
                              class="badge bg-light text-dark border service-badge me-1 mb-1"
                              th:text="${#strings.replace(svc.name(), '_', ' ')}">Service</span>
                        <span th:if="${#lists.size(garage.services) > 4}"
                              class="badge bg-secondary service-badge">
                            +<span th:text="${#lists.size(garage.services) - 4}"></span> more
                        </span>
                    </div>
                </div>

                <div class="card-footer bg-white border-0">
                    <a th:href="@{/garages/{id}(id=${garage.id})}"
                       class="btn btn-danger w-100">
                        <i class="fas fa-eye me-2"></i>View Details
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Pagination -->
    <nav class="mt-4" th:if="${garages.totalPages > 1}">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${garages.first} ? 'disabled'">
                <a class="page-link" th:href="@{/garages(page=${currentPage - 1}, keyword=${keyword})}">
                    <i class="fas fa-chevron-left"></i>
                </a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, garages.totalPages - 1)}"
                th:classappend="${i == currentPage} ? 'active'">
                <a class="page-link" th:href="@{/garages(page=${i}, keyword=${keyword})}"
                   th:text="${i + 1}">1</a>
            </li>
            <li class="page-item" th:classappend="${garages.last} ? 'disabled'">
                <a class="page-link" th:href="@{/garages(page=${currentPage + 1}, keyword=${keyword})}">
                    <i class="fas fa-chevron-right"></i>
                </a>
            </li>
        </ul>
    </nav>
</div>

<th:block th:replace="~{layout :: footer}"></th:block>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
