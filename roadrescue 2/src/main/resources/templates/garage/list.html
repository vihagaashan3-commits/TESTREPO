<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garages | RoadRescue</title>
    <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <style>
        .garage-card { transition: transform 0.2s, box-shadow 0.2s; }
        .garage-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.12) !important; }
        .service-badge { font-size: 0.7rem; }
        .star { color: #ffc107; }

        /* My Garage featured card */
        .my-garage-card {
            border: 2.5px solid #dc3545 !important;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 12px 35px rgba(220,53,69,.18) !important;
        }
        .my-garage-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 50px rgba(220,53,69,.22) !important;
        }
        .my-garage-badge {
            background: linear-gradient(135deg,#dc3545,#b71c2b);
            color: white;
            font-size: .78rem;
            font-weight: 700;
            padding: .4rem .9rem;
            border-radius: 30px;
            letter-spacing: .04em;
        }

        /* Other garages smaller row */
        .other-garage-card {
            border-radius: 14px;
            overflow: hidden;
            transition: .25s;
        }
        .other-garage-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0,0,0,.10) !important;
        }
        .other-garage-card .card-header {
            padding: .7rem 1rem;
        }
        .other-garage-card .card-body {
            padding: .75rem 1rem;
        }
        .other-garage-card .garage-name {
            font-size: .92rem;
        }
        .other-garage-card .small-detail {
            font-size: .78rem;
        }
    </style>
</head>
<body class="bg-light">
<th:block th:replace="~{layout :: navbar}"></th:block>

<div class="container my-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h5 class="fw-bold mb-0"><i class="fas fa-warehouse text-danger me-2"></i>Find a Garage</h5>
    </div>

    <!-- Search & Filter -->
    <div class="card border-0 shadow-sm mb-4">
        <div class="card-body">
            <form th:action="@{/garages}" method="get" class="row g-3 align-items-end">
                <div class="col-md-6">
                    <label class="form-label small fw-semibold">Search Garages</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-search"></i></span>
                        <input type="text" name="keyword" th:value="${keyword}"
                               class="form-control" placeholder="Garage name or address...">
                    </div>
                </div>
                <div class="col-md-4">
                    <label class="form-label small fw-semibold">Filter by Service</label>
                    <select name="serviceType" class="form-select" onchange="this.form.submit()">
                        <option value="">All Services</option>
                        <option th:each="svc : ${serviceTypes}"
                                th:value="${svc.name()}"
                                th:text="${#strings.replace(svc.name(), '_', ' ')}">Service</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-danger w-100">
                        <i class="fas fa-search me-1"></i>Search
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Results Count -->
    <p class="text-muted small mb-3">
        Showing <strong th:text="${garages.numberOfElements}">0</strong>
        of <strong th:text="${garages.totalElements}">0</strong> garages
        <span th:if="${keyword != null and !keyword.isEmpty()}">
            for "<strong th:text="${keyword}"></strong>"
        </span>
    </p>

    <!-- Empty state -->
    <div th:if="${garages.isEmpty()}" class="text-center py-5 text-muted">
        <i class="fas fa-warehouse fs-1 mb-3 d-block opacity-50"></i>
        <h6>No garages found</h6>
    </div>

    <div th:unless="${garages.isEmpty()}">

        <!-- ── MY GARAGE (featured, large) ── -->
        <div sec:authorize="hasRole('GARAGE_OWNER')" class="mb-5">
            <div th:each="garage : ${garages.content}"
                 th:if="${#authentication.name == garage.owner.email}">

                <div class="d-flex align-items-center gap-2 mb-3">
                    <span class="my-garage-badge"><i class="fas fa-star me-1"></i>My Garage</span>
                    <span class="text-muted small">This is your registered garage</span>
                </div>

                <div class="card border-0 my-garage-card">
                    <div class="card-header rr-hero text-white py-3">
                        <div class="row align-items-center">
                            <div class="col-auto">
                                <div class="rounded-circle bg-white bg-opacity-25 p-3">
                                    <i class="fas fa-warehouse fs-4"></i>
                                </div>
                            </div>
                            <div class="col">
                                <div class="fw-bold fs-5" th:text="${garage.garageName}">Garage</div>
                                <div class="small opacity-75 mt-1">
                                    <i class="fas fa-circle me-1"
                                       th:classappend="${garage.available} ? 'text-success' : 'text-warning'"
                                       style="font-size:.5rem"></i>
                                    <span th:text="${garage.available} ? 'Available' : 'Busy'">Status</span>
                                    <span th:if="${garage.verified}" class="ms-3 badge bg-success">
                                        <i class="fas fa-check-circle me-1"></i>Verified
                                    </span>
                                </div>
                            </div>
                            <div class="col-auto">
                                <a th:href="@{/garages/{id}/edit(id=${garage.id})}"
                                   class="btn btn-light btn-sm fw-semibold">
                                    <i class="fas fa-edit me-1"></i>Edit Garage
                                </a>
                            </div>
                        </div>
                    </div>
                    <div class="card-body px-4 py-3">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <p class="mb-2">
                                    <i class="fas fa-map-marker-alt text-danger me-2"></i>
                                    <span th:text="${garage.address}">Address</span>
                                </p>
                                <p class="mb-2">
                                    <i class="fas fa-phone text-success me-2"></i>
                                    <span th:text="${garage.phone}">Phone</span>
                                </p>
                                <p class="mb-2" th:if="${garage.openingTime != null}">
                                    <i class="fas fa-clock text-info me-2"></i>
                                    <span th:text="${garage.openingTime + ' - ' + garage.closingTime}">Hours</span>
                                </p>
                            </div>
                            <div class="col-md-6">
                                <div class="d-flex flex-wrap gap-2">
                                    <span th:each="svc : ${garage.services}"
                                          class="badge bg-danger bg-opacity-10 text-danger border border-danger-subtle px-3 py-2"
                                          th:text="${#strings.replace(svc.name(), '_', ' ')}">Service</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="card-footer bg-white border-0 px-4 py-3">
                        <a th:href="@{/garages/{id}(id=${garage.id})}"
                           class="btn btn-danger fw-bold">
                            <i class="fas fa-eye me-2"></i>View My Garage Page
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!-- ── DIVIDER (only for garage owners) ── -->
        <div sec:authorize="hasRole('GARAGE_OWNER')" class="mb-4">
            <div th:each="garage : ${garages.content}"
                 th:if="${#authentication.name == garage.owner.email}">
                <p class="text-muted small fw-semibold mb-3">
                    <i class="fas fa-warehouse me-2"></i>Other Garages
                </p>
            </div>
        </div>

        <!-- ── OTHER GARAGES (smaller cards) ── -->
        <div class="row g-3">
            <div th:each="garage : ${garages.content}"
                 th:unless="${#authentication.name == garage.owner.email}"
                 class="col-md-6 col-lg-4">
                <div class="card border-0 shadow-sm other-garage-card h-100">
                    <div class="card-header rr-hero text-white d-flex align-items-center gap-2">
                        <div class="rounded-circle bg-white bg-opacity-25 p-2">
                            <i class="fas fa-warehouse"></i>
                        </div>
                        <div>
                            <div class="fw-bold garage-name" th:text="${garage.garageName}">Garage</div>
                            <small class="opacity-75">
                                <i class="fas fa-circle me-1"
                                   th:classappend="${garage.available} ? 'text-success' : 'text-warning'"
                                   style="font-size:.45rem"></i>
                                <span th:text="${garage.available} ? 'Available' : 'Busy'">Status</span>
                            </small>
                        </div>
                        <div class="ms-auto" th:if="${garage.verified}">
                            <span class="badge bg-success"><i class="fas fa-check-circle me-1"></i>Verified</span>
                        </div>
                    </div>
                    <div class="card-body">
                        <p class="small-detail text-muted mb-1">
                            <i class="fas fa-map-marker-alt text-danger me-2"></i>
                            <span th:text="${garage.address}">Address</span>
                        </p>
                        <p class="small-detail text-muted mb-1">
                            <i class="fas fa-phone text-success me-2"></i>
                            <span th:text="${garage.phone}">Phone</span>
                        </p>
                        <p class="small-detail text-muted mb-2" th:if="${garage.openingTime != null}">
                            <i class="fas fa-clock text-info me-2"></i>
                            <span th:text="${garage.openingTime + ' - ' + garage.closingTime}">Hours</span>
                        </p>
                        <div>
                            <span th:each="svc, iter : ${garage.services}"
                                  th:if="${iter.index < 3}"
                                  class="badge bg-light text-dark border service-badge me-1 mb-1"
                                  th:text="${#strings.replace(svc.name(), '_', ' ')}">Service</span>
                            <span th:if="${#lists.size(garage.services) > 3}"
                                  class="badge bg-secondary service-badge">
                                +<span th:text="${#lists.size(garage.services) - 3}"></span> more
                            </span>
                        </div>
                    </div>
                    <div class="card-footer bg-white border-0">
                        <a th:href="@{/garages/{id}(id=${garage.id})}"
                           class="btn btn-outline-danger w-100 btn-sm">
                            <i class="fas fa-eye me-2"></i>View Details
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Pagination -->
        <nav class="mt-4" th:if="${garages.totalPages > 1}">
            <ul class="pagination justify-content-center">
                <li class="page-item" th:classappend="${garages.first} ? 'disabled'">
                    <a class="page-link" th:href="@{/garages(page=${currentPage - 1}, keyword=${keyword})}">
                        <i class="fas fa-chevron-left"></i>
                    </a>
                </li>
                <li class="page-item" th:each="i : ${#numbers.sequence(0, garages.totalPages - 1)}"
                    th:classappend="${i == currentPage} ? 'active'">
                    <a class="page-link" th:href="@{/garages(page=${i}, keyword=${keyword})}"
                       th:text="${i + 1}">1</a>
                </li>
                <li class="page-item" th:classappend="${garages.last} ? 'disabled'">
                    <a class="page-link" th:href="@{/garages(page=${currentPage + 1}, keyword=${keyword})}">
                        <i class="fas fa-chevron-right"></i>
                    </a>
                </li>
            </ul>
        </nav>

    </div>

</div>

<th:block th:replace="~{layout :: footer}"></th:block>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
