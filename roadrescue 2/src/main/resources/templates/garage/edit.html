<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <title>Edit Garage | RoadRescue</title>
    <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-light">
<th:block th:replace="~{layout :: navbar}"></th:block>

<div class="container my-4">
    <div class="d-flex align-items-center mb-4 gap-2">
        <a th:href="@{/garages/{id}(id=${garageId})}" class="btn btn-outline-secondary btn-sm">
            <i class="fas fa-arrow-left"></i>
        </a>
        <h5 class="mb-0 fw-bold">Edit Garage</h5>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-8">

            <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
                <span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
                <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="card border-0 shadow-sm">
                <div class="card-header rr-hero text-white py-3">
                    <div class="d-flex align-items-center gap-2">
                        <i class="fas fa-edit"></i>
                        <span class="fw-bold">Garage Details</span>
                    </div>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/garages/{id}/edit(id=${garageId})}"
                          th:object="${garageDTO}"
                          method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                        <!-- Garage Name -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Garage Name</label>
                            <input type="text" class="form-control"
                                   th:field="*{garageName}"
                                   th:classappend="${#fields.hasErrors('garageName')} ? ' is-invalid'"/>
                            <div class="invalid-feedback" th:errors="*{garageName}"></div>
                        </div>

                        <!-- Address -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Address</label>
                            <input type="text" class="form-control"
                                   th:field="*{address}"
                                   th:classappend="${#fields.hasErrors('address')} ? ' is-invalid'"/>
                            <div class="invalid-feedback" th:errors="*{address}"></div>
                        </div>

                        <!-- Phone & Email -->
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Phone</label>
                                <input type="text" class="form-control"
                                       th:field="*{phone}"
                                       th:classappend="${#fields.hasErrors('phone')} ? ' is-invalid'"/>
                                <div class="invalid-feedback" th:errors="*{phone}"></div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Email</label>
                                <input type="email" class="form-control"
                                       th:field="*{email}"
                                       th:classappend="${#fields.hasErrors('email')} ? ' is-invalid'"/>
                                <div class="invalid-feedback" th:errors="*{email}"></div>
                            </div>
                        </div>

                        <!-- Coordinates -->
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Latitude</label>
                                <input type="number" step="any" class="form-control"
                                       th:field="*{latitude}"/>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Longitude</label>
                                <input type="number" step="any" class="form-control"
                                       th:field="*{longitude}"/>
                            </div>
                        </div>

                        <!-- Opening & Closing Time -->
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Opening Time</label>
                                <input type="time" class="form-control"
                                       th:field="*{openingTime}"/>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Closing Time</label>
                                <input type="time" class="form-control"
                                       th:field="*{closingTime}"/>
                            </div>
                        </div>

                        <!-- Services -->
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Services Offered</label>
                            <div class="row row-cols-2 row-cols-md-3 g-2">
                                <div class="col" th:each="type : ${serviceTypes}">
                                    <div class="form-check">
                                        <input class="form-check-input"
                                               type="checkbox"
                                               name="services"
                                               th:value="${type}"
                                               th:id="${'svc-' + type}"
                                               th:checked="${garageDTO.services != null and garageDTO.services.contains(type)}"/>
                                        <label class="form-check-label"
                                               th:for="${'svc-' + type}"
                                               th:text="${#strings.replace(type.name(), '_', ' ')}">
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Actions -->
                        <div class="d-flex gap-2 pt-2">
                            <button type="submit" class="btn btn-danger">
                                <i class="fas fa-save me-1"></i> Save Changes
                            </button>
                            <a th:href="@{/garages/{id}(id=${garageId})}"
                               class="btn btn-outline-secondary">
                                Cancel
                            </a>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block th:replace="~{layout :: footer}"></th:block>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
