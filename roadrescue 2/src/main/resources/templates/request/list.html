<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Requests | RoadRescue</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-light">
<th:block th:replace="~{layout :: navbar}"></th:block>

<div class="container my-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h5 class="fw-bold mb-0"><i class="fas fa-clipboard-list text-danger me-2"></i>My Breakdown Requests</h5>
        <a th:href="@{/requests/new}" class="btn btn-danger">
            <i class="fas fa-plus me-2"></i>New Request
        </a>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div th:if="${requests.isEmpty()}" class="text-center py-5 text-muted">
                <i class="fas fa-inbox fs-1 mb-3 d-block opacity-50"></i>
                <h6>No requests found</h6>
                <a th:href="@{/requests/new}" class="btn btn-danger mt-2">Request Help Now</a>
            </div>

            <div th:unless="${requests.isEmpty()}" class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>#ID</th>
                        <th>Service Type</th>
                        <th>Location</th>
                        <th>Garage</th>
                        <th>Status</th>
                        <th>Date</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="req : ${requests}">
                        <td class="fw-semibold text-danger">#<span th:text="${req.id}"></span></td>
                        <td>
                            <!-- Multiple service types -->
                            <span th:if="${req.serviceTypes != null and !req.serviceTypes.isEmpty()}">
                                <span th:each="svc : ${req.serviceTypes}"
                                      class="badge bg-secondary me-1"
                                      th:text="${#strings.replace(svc.name(), '_', ' ')}"></span>
                            </span>
                            <!-- Fallback for old single-service requests -->
                            <span th:if="${req.serviceTypes == null or req.serviceTypes.isEmpty()}">
                                <span class="badge bg-secondary"
                                      th:text="${req.serviceType != null ? #strings.replace(req.serviceType.name(), '_', ' ') : '—'}"></span>
                            </span>
                        </td>
                        <td>
                            <small th:text="${req.locationAddress != null ? req.locationAddress : 'GPS Location'}">—</small>
                        </td>
                        <td>
                            <span th:if="${req.garage != null}" th:text="${req.garage.garageName}" class="small"></span>
                            <span th:if="${req.garage == null}" class="text-muted small">Not assigned</span>
                        </td>
                        <td>
                            <span th:class="${'badge ' +
                                (req.status.name() == 'PENDING' ? 'bg-warning text-dark' :
                                 req.status.name() == 'ACCEPTED' ? 'bg-info' :
                                 req.status.name() == 'IN_PROGRESS' ? 'bg-primary' :
                                 req.status.name() == 'COMPLETED' ? 'bg-success' : 'bg-danger')}"
                                  th:text="${req.status}">Status</span>
                        </td>
                        <td><small th:text="${#temporals.format(req.createdAt, 'dd MMM yyyy')}"></small></td>
                        <td>
                            <a th:href="@{/requests/{id}(id=${req.id})}"
                               class="btn btn-sm btn-outline-primary me-1">
                                <i class="fas fa-eye"></i>
                            </a>
                            <form th:if="${req.status.name() == 'PENDING'}"
                                  th:action="@{/requests/{id}/cancel(id=${req.id})}" method="post"
                                  class="d-inline" onsubmit="return confirm('Cancel this request?')">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" class="btn btn-sm btn-outline-danger">
                                    <i class="fas fa-times"></i>
                                </button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Pagination -->
        <div class="card-footer bg-white" th:if="${requests.totalPages > 1}">
            <nav>
                <ul class="pagination pagination-sm justify-content-center mb-0">
                    <li class="page-item" th:classappend="${requests.first} ? 'disabled'">
                        <a class="page-link" th:href="@{/requests(page=${currentPage - 1})}">
                            <i class="fas fa-chevron-left"></i>
                        </a>
                    </li>
                    <li class="page-item" th:each="i : ${#numbers.sequence(0, requests.totalPages - 1)}"
                        th:classappend="${i == currentPage} ? 'active'">
                        <a class="page-link" th:href="@{/requests(page=${i})}" th:text="${i + 1}">1</a>
                    </li>
                    <li class="page-item" th:classappend="${requests.last} ? 'disabled'">
                        <a class="page-link" th:href="@{/requests(page=${currentPage + 1})}">
                            <i class="fas fa-chevron-right"></i>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</div>

<th:block th:replace="~{layout :: footer}"></th:block>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
