<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Vehicle | RoadRescue</title>
    <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-light">
<th:block th:replace="~{layout :: navbar}"></th:block>

<div class="container my-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="d-flex align-items-center mb-4 gap-2">
                <a th:href="@{/vehicles}" class="btn btn-outline-secondary btn-sm">
                    <i class="fas fa-arrow-left"></i>
                </a>
                <h5 class="mb-0 fw-bold"><i class="fas fa-car text-danger me-2"></i>Add New Vehicle</h5>
            </div>

            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <form th:action="@{/vehicles/new}" th:object="${vehicle}" method="post"
                          enctype="multipart/form-data" novalidate>
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Vehicle Type *</label>
                            <select th:field="*{vehicleType}" class="form-select"
                                    th:classappend="${#fields.hasErrors('vehicleType')} ? 'is-invalid'">
                                <option value="">-- Select Type --</option>
                                <option value="Car">Car</option>
                                <option value="Van">Van</option>
                                <option value="Truck">Truck</option>
                                <option value="Bike">Bike (Motorcycle)</option>
                                <option value="Bus">Bus</option>
                            </select>
                            <div class="invalid-feedback" th:errors="*{vehicleType}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Brand *</label>
                            <input type="text" th:field="*{brand}" class="form-control"
                                   th:classappend="${#fields.hasErrors('brand')} ? 'is-invalid'"
                                   placeholder="e.g. Toyota, Honda, Suzuki">
                            <div class="invalid-feedback" th:errors="*{brand}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Model *</label>
                            <input type="text" th:field="*{model}" class="form-control"
                                   th:classappend="${#fields.hasErrors('model')} ? 'is-invalid'"
                                   placeholder="e.g. Corolla, Civic, Alto">
                            <div class="invalid-feedback" th:errors="*{model}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Plate Number *</label>
                            <input type="text" th:field="*{plateNumber}" class="form-control"
                                   th:classappend="${#fields.hasErrors('plateNumber')} ? 'is-invalid'"
                                   placeholder="e.g. CAB-1234" style="text-transform:uppercase">
                            <div class="invalid-feedback" th:errors="*{plateNumber}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Chassis Number *</label>
                            <input type="text" th:field="*{chassisNumber}" class="form-control"
                                   th:classappend="${#fields.hasErrors('chassisNumber')} ? 'is-invalid'"
                                   placeholder="e.g. MHFXX1234K123456" style="text-transform:uppercase">
                            <div class="invalid-feedback" th:errors="*{chassisNumber}"></div>
                        </div>

                        <div class="row g-3 mb-3">
                            <div class="col-6">
                                <label class="form-label fw-semibold">Year</label>
                                <input type="number" th:field="*{year}" class="form-control"
                                       placeholder="2020" min="1990" max="2025">
                            </div>
                            <div class="col-6">
                                <label class="form-label fw-semibold">Color</label>
                                <input type="text" th:field="*{color}" class="form-control"
                                       placeholder="e.g. White, Blue">
                            </div>
                        </div>

                        <div class="row g-3 mb-4">
                            <div class="col-6">
                                <label class="form-label fw-semibold">Front Image *</label>
                                <input type="file" name="frontImage" class="form-control"
                                       th:classappend="${#fields.hasErrors('frontImagePath')} ? 'is-invalid'"
                                       accept="image/*" required>
                                <div class="invalid-feedback" th:errors="*{frontImagePath}"></div>
                            </div>
                            <div class="col-6">
                                <label class="form-label fw-semibold">Back Image *</label>
                                <input type="file" name="backImage" class="form-control"
                                       th:classappend="${#fields.hasErrors('backImagePath')} ? 'is-invalid'"
                                       accept="image/*" required>
                                <div class="invalid-feedback" th:errors="*{backImagePath}"></div>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-danger w-100">
                            <i class="fas fa-plus me-2"></i>Add Vehicle
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block th:replace="~{layout :: footer}"></th:block>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
