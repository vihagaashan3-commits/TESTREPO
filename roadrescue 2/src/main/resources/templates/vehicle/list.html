<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Vehicles | RoadRescue</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-light">
<th:block th:replace="~{layout :: navbar}"></th:block>

<div class="container my-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h5 class="fw-bold mb-0"><i class="fas fa-car text-danger me-2"></i>My Vehicles</h5>
        <a th:href="@{/vehicles/new}" class="btn btn-danger">
            <i class="fas fa-plus me-2"></i>Add Vehicle
        </a>
    </div>

    <!-- Flash -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <i class="fas fa-check-circle me-2"></i><span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div th:if="${vehicles.isEmpty()}" class="text-center py-5 text-muted">
        <i class="fas fa-car fs-1 mb-3 d-block opacity-50"></i>
        <h6>No vehicles added yet</h6>
        <a th:href="@{/vehicles/new}" class="btn btn-danger mt-2">Add Your Vehicle</a>
    </div>

    <div class="row g-4" th:unless="${vehicles.isEmpty()}">
        <div class="col-md-6 col-lg-4" th:each="v : ${vehicles}">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-header rr-hero text-white">
                    <div class="d-flex align-items-center gap-3">
                        <div class="rounded-circle bg-white bg-opacity-25 p-2">
                            <i th:class="${v.vehicleType == 'Bike' ? 'fas fa-motorcycle' :
                                          v.vehicleType == 'Truck' ? 'fas fa-truck' :
                                          v.vehicleType == 'Van' ? 'fas fa-shuttle-van' : 'fas fa-car'} + ' fs-4'"></i>
                        </div>
                        <div>
                            <div class="fw-bold" th:text="${v.brand + ' ' + v.model}">Vehicle</div>
                            <small class="opacity-75" th:text="${v.plateNumber}">Plate</small>
                        </div>
                    </div>
                </div>
                <div class="card-body">
                    <ul class="list-unstyled small mb-0">
                        <li class="mb-1"><span class="text-muted me-2">Type:</span><span th:text="${v.vehicleType}">—</span></li>
                        <li class="mb-1"><span class="text-muted me-2">Year:</span><span th:text="${v.year != null ? v.year : '—'}">—</span></li>
                        <li class="mb-1"><span class="text-muted me-2">Color:</span><span th:text="${v.color != null ? v.color : '—'}">—</span></li>
                        <li><span class="text-muted me-2">Plate:</span><strong th:text="${v.plateNumber}">—</strong></li>
                    </ul>
                </div>
                <div class="card-footer bg-white border-0 d-flex gap-2">
                    <a th:href="@{/vehicles/{id}/edit(id=${v.id})}" class="btn btn-sm btn-outline-warning flex-fill">
                        <i class="fas fa-edit me-1"></i>Edit
                    </a>
                    <form th:action="@{/vehicles/{id}/delete(id=${v.id})}" method="post"
                          class="flex-fill" onsubmit="return confirm('Remove this vehicle?')">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn btn-sm btn-outline-danger w-100">
                            <i class="fas fa-trash me-1"></i>Remove
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block th:replace="~{layout :: footer}"></th:block>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
