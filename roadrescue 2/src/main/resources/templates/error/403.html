<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 Forbidden | RoadRescue</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="min-vh-100 d-flex align-items-center justify-content-center">
    <div class="text-center px-4">
        <div class="display-1 fw-bold text-warning mb-0">403</div>
        <div class="fs-1 mb-3">🚫</div>
        <h4 class="fw-bold mb-2">Access Denied</h4>
        <p class="text-muted mb-4" th:text="${message != null ? message : 'You do not have permission to access this resource.'}">Forbidden.</p>
        <a href="/dashboard" class="btn btn-warning px-4">
            <i class="fas fa-home me-2"></i>Back to Dashboard
        </a>
    </div>
</div>
</body>
</html>
