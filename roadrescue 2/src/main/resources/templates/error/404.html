<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found | RoadRescue</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="min-vh-100 d-flex align-items-center justify-content-center">
    <div class="text-center px-4">
        <div class="display-1 fw-bold text-danger mb-0">404</div>
        <div class="fs-1 mb-3">🚗💨</div>
        <h4 class="fw-bold mb-2">Page Not Found</h4>
        <p class="text-muted mb-4" th:text="${message != null ? message : 'The page you are looking for does not exist.'}">Not found.</p>

    </div>
</div>
</body>
</html>
