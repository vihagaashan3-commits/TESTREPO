<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications | RoadRescue</title>
    <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>

<body class="bg-light">
<th:block th:replace="~{layout :: navbar}"></th:block>

<div class="container my-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h5 class="fw-bold mb-0"><i class="fas fa-bell text-danger me-2"></i>Notifications</h5>
        <form th:action="@{/notifications/read-all}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn btn-outline-secondary btn-sm">
                <i class="fas fa-check-double me-1"></i>Mark All Read
            </button>
        </form>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="list-group list-group-flush"
             th:if="${notifications != null and !notifications.isEmpty()}">
            <div th:each="n : ${notifications}"
                 th:class="${'list-group-item list-group-item-action py-3 ' + (!n.read ? 'bg-danger bg-opacity-5 border-start border-danger border-3' : '')}">
                <div class="d-flex justify-content-between align-items-start">
                    <div class="d-flex gap-3">
                        <div th:class="${'rounded-circle d-flex align-items-center justify-content-center flex-shrink-0 ' +
                            (n.notificationType == 'REQUEST_ACCEPTED' ? 'bg-success' :
                             n.notificationType == 'PAYMENT_SUCCESS' ? 'bg-warning' :
                             n.notificationType == 'PAYMENT_CREATED' ? 'bg-info' : 'bg-secondary') + ' text-white'}"
                             style="width:42px;height:42px;">
                            <i th:class="${n.notificationType == 'REQUEST_ACCEPTED' ? 'fas fa-check' :
                                          n.notificationType == 'PAYMENT_SUCCESS' ? 'fas fa-dollar-sign' :
                                          n.notificationType == 'PAYMENT_CREATED' ? 'fas fa-file-invoice' :
                                          'fas fa-bell'}"></i>
                        </div>
                        <div>
                            <div class="fw-semibold" th:text="${n.title}">Title</div>
                            <div class="small text-muted" th:text="${n.message}">Message</div>
                            <div th:if="${n.breakdownRequest != null}" class="mt-1">
                                <a th:href="@{/requests/{id}(id=${n.breakdownRequest.id})}"
                                   class="btn btn-sm btn-outline-danger py-0 px-2">
                                    View Request #<span th:text="${n.breakdownRequest.id}"></span>
                                </a>
                            </div>
                        </div>
                    </div>
                    <div class="text-end flex-shrink-0 ms-3">
                        <small class="text-muted d-block"
                               th:text="${#temporals.format(n.createdAt, 'dd MMM, HH:mm')}">Date</small>
                        <span th:unless="${n.read}" class="badge bg-danger mt-1">New</span>
                    </div>
                </div>
            </div>
        </div>

        <div th:if="${notifications == null or notifications.isEmpty()}"
             class="text-center py-5 text-muted">
            <i class="fas fa-bell-slash fs-1 d-block mb-3 opacity-50"></i>
            <h6>No notifications yet</h6>
        </div>

        <!-- Pagination -->
        <div class="card-footer bg-white" th:if="${notifications != null and notifications.totalPages > 1}">
            <nav>
                <ul class="pagination pagination-sm justify-content-center mb-0">
                    <li class="page-item" th:classappend="${notifications.first} ? 'disabled'">
                        <a class="page-link" th:href="@{/notifications(page=${currentPage - 1})}">
                            <i class="fas fa-chevron-left"></i>
                        </a>
                    </li>
                    <li class="page-item" th:each="i : ${#numbers.sequence(0, notifications.totalPages - 1)}"
                        th:classappend="${i == currentPage} ? 'active'">
                        <a class="page-link" th:href="@{/notifications(page=${i})}" th:text="${i + 1}">1</a>
                    </li>
                    <li class="page-item" th:classappend="${notifications.last} ? 'disabled'">
                        <a class="page-link" th:href="@{/notifications(page=${currentPage + 1})}">
                            <i class="fas fa-chevron-right"></i>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</div>

<th:block th:replace="~{layout :: footer}"></th:block>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
