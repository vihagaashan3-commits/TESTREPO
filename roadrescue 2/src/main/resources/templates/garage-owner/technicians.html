<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Requests | RoadRescue</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-light">

<th:block th:replace="~{layout :: navbar}"></th:block>

<div class="container-fluid my-4">
    <div class="row">
        <!-- Sidebar -->
        <div class="col-md-2">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-0">
                    <div class="list-group list-group-flush rounded">
                        <a th:href="@{/garage-owner/dashboard}" class="list-group-item list-group-item-action">
                            <i class="fas fa-tachometer-alt me-2"></i>Dashboard
                        </a>
                        <a th:href="@{/garage-owner/requests}" class="list-group-item list-group-item-action active bg-danger text-white">
                            <i class="fas fa-clipboard-list me-2"></i>Requests
                        </a>
                        <a th:href="@{/garage-owner/technicians}" class="list-group-item list-group-item-action">
                            <i class="fas fa-user-cog me-2"></i>Technicians
                        </a>
                        <a th:href="@{/garages}" class="list-group-item list-group-item-action">
                            <i class="fas fa-warehouse me-2"></i>My Garage
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="col-md-10">
            <h4 class="fw-bold mb-4"><i class="fas fa-clipboard-list me-2 text-danger"></i>Breakdown Requests</h4>

            <div class="card border-0 shadow-sm">
                <div class="card-body p-0">
                    <div th:if="${requests == null or requests.isEmpty()}" class="text-center py-5 text-muted">
                        <i class="fas fa-inbox fs-1 mb-3 d-block"></i>
                        <p>No requests found.</p>
                    </div>
                    <div th:unless="${requests == null or requests.isEmpty()}" class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead class="table-light">
                            <tr>
                                <th>#</th>
                                <th>Customer</th>
                                <th>Service</th>
                                <th>Location</th>
                                <th>Status</th>
                                <th>Date</th>
                                <th>Actions</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="req : ${requests}">
                                <td th:text="${req.id}">#</td>
                                <td th:text="${req.user.fullName}">Customer</td>
                                <td>
                                    <span class="badge bg-secondary"
                                          th:text="${#strings.replace(req.serviceType.name(), '_', ' ')}">Service</span>
                                </td>
                                <td th:text="${req.locationAddress != null ? req.locationAddress : 'GPS Location'}">Location</td>
                                <td>
                                    <span th:class="${'badge ' +
                                        (req.status.name() == 'PENDING' ? 'bg-warning text-dark' :
                                         req.status.name() == 'ACCEPTED' ? 'bg-info' :
                                         req.status.name() == 'IN_PROGRESS' ? 'bg-primary' :
                                         req.status.name() == 'COMPLETED' ? 'bg-success' : 'bg-danger')}"
                                          th:text="${req.status}">Status</span>
                                </td>
                                <td th:text="${#temporals.format(req.createdAt, 'dd MMM yyyy')}">Date</td>
                                <td>
                                    <div class="d-flex gap-1 flex-wrap">
                                        <form th:if="${req.status.name() == 'PENDING'}"
                                              th:action="@{/garage-owner/requests/{id}/accept(id=${req.id})}"
                                              method="post">
                                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                            <button class="btn btn-sm btn-success">
                                                <i class="fas fa-check me-1"></i>Accept
                                            </button>
                                        </form>
                                        <form th:if="${req.status.name() == 'ACCEPTED'}"
                                              th:action="@{/garage-owner/requests/{id}/in-progress(id=${req.id})}"
                                              method="post">
                                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                            <button class="btn btn-sm btn-primary">
                                                <i class="fas fa-spinner me-1"></i>In Progress
                                            </button>
                                        </form>
                                        <form th:if="${req.status.name() == 'IN_PROGRESS'}"
                                              th:action="@{/garage-owner/requests/{id}/complete(id=${req.id})}"
                                              method="post">
                                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                            <button class="btn btn-sm btn-danger">
                                                <i class="fas fa-flag-checkered me-1"></i>Complete
                                            </button>
                                        </form>
                                        <span th:if="${req.status.name() == 'COMPLETED'}"
                                              class="badge bg-success p-2">
                                            <i class="fas fa-check-double me-1"></i>Done
                                        </span>
                                    </div>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <!-- Pagination -->
                <div class="card-footer bg-white" th:if="${requests != null and requests.totalPages > 1}">
                    <nav>
                        <ul class="pagination pagination-sm justify-content-center mb-0">
                            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                                <a class="page-link" th:href="@{/garage-owner/requests(page=${currentPage - 1})}">Previous</a>
                            </li>
                            <li class="page-item" th:each="i : ${#numbers.sequence(0, requests.totalPages - 1)}"
                                th:classappend="${i == currentPage} ? 'active'">
                                <a class="page-link" th:href="@{/garage-owner/requests(page=${i})}" th:text="${i + 1}">1</a>
                            </li>
                            <li class="page-item" th:classappend="${currentPage == requests.totalPages - 1} ? 'disabled'">
                                <a class="page-link" th:href="@{/garage-owner/requests(page=${currentPage + 1})}">Next</a>
                            </li>
                        </ul>
                    </nav>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block th:replace="~{layout :: footer}"></th:block>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
