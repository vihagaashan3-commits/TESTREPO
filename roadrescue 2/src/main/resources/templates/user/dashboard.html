<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title>Dashboard | RoadRescue</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-light">

<th:block th:replace="~{layout :: navbar}"></th:block>

<div class="container my-4">
    <!-- Flash messages -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <i class="fas fa-check-circle me-2"></i><span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Welcome Banner -->
    <div class="rr-hero rounded-3 p-4 mb-4 text-white">
        <div class="row align-items-center">
            <div class="col">
                <h4 class="mb-1">Welcome back, <span th:text="${user.fullName}">User</span>! 👋</h4>
                <p class="mb-0 opacity-75">Need help on the road? We're here 24/7.</p>
            </div>
            <div class="col-auto">
                <a th:href="@{/requests/new}" class="btn btn-warning btn-lg fw-bold">
                    <i class="fas fa-exclamation-triangle me-2"></i>Request Emergency Help
                </a>
            </div>
        </div>
    </div>

    <!-- Stats Row -->
    <div class="row g-3 mb-4">
        <div class="col-md-4">
            <div class="card border-0 shadow-sm text-center p-3">
                <div class="text-danger fs-1"><i class="fas fa-tools"></i></div>
                <h5 class="mt-2 mb-0" th:text="${myRequests.totalElements}">0</h5>
                <small class="text-muted">Total Requests</small>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card border-0 shadow-sm text-center p-3">
                <div class="text-warning fs-1"><i class="fas fa-car"></i></div>
                <h5 class="mt-2 mb-0">
                    <a th:href="@{/vehicles}" class="text-decoration-none text-dark">My Vehicles</a>
                </h5>
                <small class="text-muted">Manage your vehicles</small>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card border-0 shadow-sm text-center p-3">
                <div class="text-success fs-1"><i class="fas fa-bell"></i></div>
                <h5 class="mt-2 mb-0" th:text="${unreadCount}">0</h5>
                <small class="text-muted">Unread Notifications</small>
            </div>
        </div>
    </div>

    <!-- Recent Requests -->
    <div class="card border-0 shadow-sm">
        <div class="card-header bg-white d-flex justify-content-between align-items-center">
            <h6 class="mb-0 fw-bold"><i class="fas fa-history me-2 text-danger"></i>Recent Requests</h6>
            <a th:href="@{/requests}" class="btn btn-sm btn-outline-danger">View All</a>
        </div>
        <div class="card-body p-0">
            <div th:if="${myRequests.isEmpty()}" class="text-center py-5 text-muted">
                <i class="fas fa-inbox fs-1 mb-3 d-block"></i>
                <p>No breakdown requests yet.</p>
                <a th:href="@{/requests/new}" class="btn btn-danger">Request Help Now</a>
            </div>
            <div th:unless="${myRequests.isEmpty()}" class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>#</th>
                        <th>Service</th>
                        <th>Location</th>
                        <th>Status</th>
                        <th>Date</th>
                        <th></th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="req : ${myRequests}">
                        <td th:text="${req.id}">#</td>
                        <td>
                            <span class="badge bg-secondary" th:text="${#strings.replace(req.serviceType.name(), '_', ' ')}">Service</span>
                        </td>
                        <td th:text="${req.locationAddress != null ? req.locationAddress : 'GPS Location'}">Location</td>
                        <td>
                            <span th:class="${'badge ' +
                                (req.status.name() == 'PENDING' ? 'bg-warning text-dark' :
                                 req.status.name() == 'ACCEPTED' ? 'bg-info' :
                                 req.status.name() == 'IN_PROGRESS' ? 'bg-primary' :
                                 req.status.name() == 'COMPLETED' ? 'bg-success' : 'bg-danger')}"
                                  th:text="${req.status}">Status</span>
                        </td>
                        <td th:text="${#temporals.format(req.createdAt, 'dd MMM yyyy')}">Date</td>
                        <td>
                            <a th:href="@{/requests/{id}(id=${req.id})}" class="btn btn-sm btn-outline-primary">
                                <i class="fas fa-eye"></i>
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<th:block th:replace="~{layout :: footer}"></th:block>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
