<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | RoadRescue</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-light">
<div class="min-vh-100 d-flex align-items-center justify-content-center py-5">
    <div class="card shadow-lg" style="width: 480px;">
        <div class="card-header bg-danger text-white text-center py-4">
            <h3 class="mb-0"><i class="fas fa-car-crash me-2"></i>RoadRescue</h3>
            <p class="mb-0 small">Create Your Account</p>
        </div>
        <div class="card-body p-4">
            <form th:action="@{/auth/register}" th:object="${registerDTO}" method="post" novalidate>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <!-- Full Name -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">Full Name</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-user"></i></span>
                        <input type="text" th:field="*{fullName}" class="form-control"
                               th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid'"
                               placeholder="Your full name">
                    </div>
                    <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('fullName')}"
                         th:errors="*{fullName}"></div>
                </div>

                <!-- Email -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                        <input type="email" th:field="*{email}" class="form-control"
                               th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                               placeholder="your@email.com">
                    </div>
                    <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('email')}"
                         th:errors="*{email}"></div>
                </div>

                <!-- Phone -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">Phone Number</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-phone"></i></span>
                        <input type="tel" th:field="*{phone}" class="form-control"
                               th:classappend="${#fields.hasErrors('phone')} ? 'is-invalid'"
                               placeholder="0771234567">
                    </div>
                    <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('phone')}"
                         th:errors="*{phone}"></div>
                </div>

                <!-- Account Type -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">Account Type</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-id-badge"></i></span>
                        <select th:field="*{role}" class="form-select">
                            <option value="USER">Vehicle Owner (Driver)</option>
                            <option value="GARAGE_OWNER">Garage Owner</option>
                        </select>
                    </div>
                </div>

                <!-- Password -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-lock"></i></span>
                        <input type="password" th:field="*{password}" class="form-control"
                               th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
                               placeholder="Min 6 characters">
                    </div>
                    <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('password')}"
                         th:errors="*{password}"></div>
                </div>

                <!-- Confirm Password -->
                <div class="mb-4">
                    <label class="form-label fw-semibold">Confirm Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-lock"></i></span>
                        <input type="password" th:field="*{confirmPassword}" class="form-control"
                               th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid'"
                               placeholder="Repeat your password">
                    </div>
                    <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('confirmPassword')}"
                         th:errors="*{confirmPassword}"></div>
                </div>

                <!-- Error message -->
                <div th:if="${error}" class="alert alert-danger mb-3">
                    <i class="fas fa-exclamation-circle me-2"></i>
                    <span th:text="${error}"></span>
                </div>

                <button type="submit" class="btn btn-danger w-100 py-2">
                    <i class="fas fa-user-plus me-2"></i>Create Account
                </button>
            </form>

            <hr>
            <div class="text-center">
                <p class="mb-0">Already have an account?
                    <a th:href="@{/auth/login}" class="text-danger fw-semibold">Sign in here</a>
                </p>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
