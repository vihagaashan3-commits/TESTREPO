<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Garages | RoadRescue</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-light">
<th:block th:replace="~{layout :: navbar}"></th:block>

<div class="container-fluid my-4">
    <div class="row">
        <div class="col-md-2">
            <div class="card border-0 shadow-sm">
                <div class="list-group list-group-flush rounded">
                    <a th:href="@{/dashboard}" class="list-group-item list-group-item-action">
                        <i class="fas fa-tachometer-alt me-2"></i>Dashboard
                    </a>
                    <a th:href="@{/admin/users}" class="list-group-item list-group-item-action">
                        <i class="fas fa-users me-2"></i>Users
                    </a>
                    <a th:href="@{/admin/garages}" class="list-group-item list-group-item-action active bg-danger text-white">
                        <i class="fas fa-warehouse me-2"></i>Garages
                    </a>
                    <a th:href="@{/requests/all}" class="list-group-item list-group-item-action">
                        <i class="fas fa-clipboard-list me-2"></i>Requests
                    </a>
                </div>
            </div>
        </div>

        <div class="col-md-10">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h5 class="fw-bold mb-0"><i class="fas fa-warehouse text-danger me-2"></i>Manage Garages</h5>
            </div>

            <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
                <i class="fas fa-check-circle me-2"></i><span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="card border-0 shadow-sm">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                            <tr>
                                <th>#</th>
                                <th>Garage Name</th>
                                <th>Owner</th>
                                <th>Phone</th>
                                <th>Address</th>
                                <th>Verified</th>
                                <th>Available</th>
                                <th>Actions</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="g : ${garages}">
                                <td th:text="${g.id}"></td>
                                <td>
                                    <a th:href="@{/garages/{id}(id=${g.id})}" th:text="${g.garageName}"
                                       class="fw-semibold text-decoration-none text-danger">Garage</a>
                                </td>
                                <td th:text="${g.owner.fullName}">Owner</td>
                                <td th:text="${g.phone}">Phone</td>
                                <td><small th:text="${g.address}">Address</small></td>
                                <td>
                                    <span th:class="${g.verified ? 'badge bg-success' : 'badge bg-warning text-dark'}"
                                          th:text="${g.verified ? 'Verified' : 'Pending'}">Status</span>
                                </td>
                                <td>
                                    <span th:class="${g.available ? 'badge bg-success' : 'badge bg-secondary'}"
                                          th:text="${g.available ? 'Yes' : 'No'}">Available</span>
                                </td>
                                <td>
                                    <form th:action="@{/admin/garages/{id}/verify(id=${g.id})}" method="post"
                                          class="d-inline" th:unless="${g.verified}">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                        <button type="submit" class="btn btn-sm btn-success me-1" title="Verify">
                                            <i class="fas fa-check-circle"></i>
                                        </button>
                                    </form>
                                    <a th:href="@{/garages/{id}(id=${g.id})}" class="btn btn-sm btn-outline-primary me-1">
                                        <i class="fas fa-eye"></i>
                                    </a>
                                    <form th:action="@{/admin/garages/{id}/delete(id=${g.id})}" method="post"
                                          class="d-inline" onsubmit="return confirm('Delete this garage?')">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                        <button type="submit" class="btn btn-sm btn-outline-danger">
                                            <i class="fas fa-trash"></i>
                                        </button>
                                    </form>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <div class="card-footer bg-white" th:if="${garages.totalPages > 1}">
                    <nav>
                        <ul class="pagination pagination-sm justify-content-center mb-0">
                            <li class="page-item" th:classappend="${garages.first} ? 'disabled'">
                                <a class="page-link" th:href="@{/admin/garages(page=${currentPage - 1})}">
                                    <i class="fas fa-chevron-left"></i>
                                </a>
                            </li>
                            <li class="page-item" th:each="i : ${#numbers.sequence(0, garages.totalPages - 1)}"
                                th:classappend="${i == currentPage} ? 'active'">
                                <a class="page-link" th:href="@{/admin/garages(page=${i})}" th:text="${i + 1}">1</a>
                            </li>
                            <li class="page-item" th:classappend="${garages.last} ? 'disabled'">
                                <a class="page-link" th:href="@{/admin/garages(page=${currentPage + 1})}">
                                    <i class="fas fa-chevron-right"></i>
                                </a>
                            </li>
                        </ul>
                    </nav>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block th:replace="~{layout :: footer}"></th:block>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
