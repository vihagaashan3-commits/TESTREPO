<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | RoadRescue</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-light">

<th:block th:replace="~{layout :: navbar}"></th:block>

<div class="container-fluid my-4">
    <div class="row">
        <!-- Sidebar -->
        <div class="col-md-2">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-0">
                    <div class="list-group list-group-flush rounded">
                        <a th:href="@{/dashboard}" class="list-group-item list-group-item-action active bg-danger text-white">
                            <i class="fas fa-tachometer-alt me-2"></i>Dashboard
                        </a>
                        <a th:href="@{/admin/users}" class="list-group-item list-group-item-action">
                            <i class="fas fa-users me-2"></i>Users
                        </a>
                        <a th:href="@{/admin/garages}" class="list-group-item list-group-item-action">
                            <i class="fas fa-warehouse me-2"></i>Garages
                        </a>
                        <a th:href="@{/requests/all}" class="list-group-item list-group-item-action">
                            <i class="fas fa-clipboard-list me-2"></i>Requests
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="col-md-10">
            <h4 class="fw-bold mb-4"><i class="fas fa-tachometer-alt me-2 text-danger"></i>Admin Dashboard</h4>

            <!-- Stats -->
            <div class="row g-3 mb-4">
                <div class="col-md-3">
                    <div class="card border-0 shadow-sm">
                        <div class="card-body d-flex align-items-center gap-3">
                            <div class="rounded-circle bg-danger bg-opacity-10 p-3">
                                <i class="fas fa-users text-danger fs-4"></i>
                            </div>
                            <div>
                                <div class="fw-bold fs-4" th:text="${totalUsers}">0</div>
                                <small class="text-muted">Total Users</small>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card border-0 shadow-sm">
                        <div class="card-body d-flex align-items-center gap-3">
                            <div class="rounded-circle bg-warning bg-opacity-10 p-3">
                                <i class="fas fa-warehouse text-warning fs-4"></i>
                            </div>
                            <div>
                                <div class="fw-bold fs-4" th:text="${totalGarages}">0</div>
                                <small class="text-muted">Garages</small>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card border-0 shadow-sm">
                        <div class="card-body d-flex align-items-center gap-3">
                            <div class="rounded-circle bg-primary bg-opacity-10 p-3">
                                <i class="fas fa-clipboard-list text-primary fs-4"></i>
                            </div>
                            <div>
                                <div class="fw-bold fs-4" th:text="${totalRequests}">0</div>
                                <small class="text-muted">Total Requests</small>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card border-0 shadow-sm">
                        <div class="card-body d-flex align-items-center gap-3">
                            <div class="rounded-circle bg-success bg-opacity-10 p-3">
                                <i class="fas fa-clock text-success fs-4"></i>
                            </div>
                            <div>
                                <div class="fw-bold fs-4" th:text="${pendingRequests}">0</div>
                                <small class="text-muted">Pending</small>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Quick Actions -->
            <div class="row g-3">
                <div class="col-md-4">
                    <div class="card border-0 shadow-sm h-100">
                        <div class="card-header bg-white fw-bold">
                            <i class="fas fa-bolt text-danger me-2"></i>Quick Actions
                        </div>
                        <div class="card-body d-grid gap-2">
                            <a th:href="@{/admin/users}" class="btn btn-outline-danger">
                                <i class="fas fa-users me-2"></i>Manage Users
                            </a>
                            <a th:href="@{/admin/garages}" class="btn btn-outline-warning">
                                <i class="fas fa-warehouse me-2"></i>Verify Garages
                            </a>
                            <a th:href="@{/requests/all}" class="btn btn-outline-primary">
                                <i class="fas fa-clipboard-list me-2"></i>View All Requests
                            </a>
                        </div>
                    </div>
                </div>
                <div class="col-md-8">
                    <div class="card border-0 shadow-sm h-100">
                        <div class="card-header bg-white fw-bold">
                            <i class="fas fa-info-circle text-primary me-2"></i>System Status
                        </div>
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <span>Active Users</span>
                                <span class="badge bg-success" th:text="${totalUsers}">0</span>
                            </div>
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <span>Verified Garages</span>
                                <span class="badge bg-primary" th:text="${totalGarages}">0</span>
                            </div>
                            <div class="d-flex justify-content-between align-items-center">
                                <span>Pending Requests</span>
                                <span class="badge bg-warning text-dark" th:text="${pendingRequests}">0</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block th:replace="~{layout :: footer}"></th:block>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
