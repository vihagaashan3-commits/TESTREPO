# ================================
# APPLICATION
# ================================
spring.application.name=RoadRescue
server.port=8080

# ================================
# DATABASE
# ================================
spring.datasource.url=jdbc:mysql://localhost:3306/roadrescue_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ================================
# JPA / HIBERNATE
# ================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ================================
# THYMELEAF
# ================================
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ================================
# SESSION
# ================================
spring.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.same-site=strict

# ================================
# FILE UPLOAD
# ================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads/

# ================================
# EMAIL (Update with your SMTP)
# ================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ================================
# GOOGLE MAPS API KEY
# ================================
google.maps.api.key=YOUR_GOOGLE_MAPS_API_KEY

# ================================
# CACHE
# ================================
spring.cache.type=simple

# ================================
# LOGGING
# ================================
logging.level.com.roadrescue=DEBUG
logging.level.org.springframework.security=INFO
