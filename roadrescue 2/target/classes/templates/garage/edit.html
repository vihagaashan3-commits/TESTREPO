<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Garage | RoadRescue</title>
</head>
<body>

<div class="container">
    <h2>Edit Garage Details</h2>

    <form th:action="@{/garages/{id}/edit(id=${garageId})}" th:object="${garageDTO}" method="post">

        <div>
            <label>Garage Name:</label>
            <input type="text" th:field="*{garageName}" required />
            <span th:if="${#fields.hasErrors('garageName')}" th:errors="*{garageName}" style="color:red"></span>
        </div>

        <div>
            <label>Location/Address:</label>
            <input type="text" th:field="*{address}" required />
        </div>

        <div>
            <label>Phone Number:</label>
            <input type="text" th:field="*{phone}" required />
        </div>

        <div>
            <label>Email Address:</label>
            <input type="email" th:field="*{email}" required />
        </div>

        <div>
            <label>Operating Hours:</label>
            <input type="time" th:field="*{openingTime}" /> to
            <input type="time" th:field="*{closingTime}" />
        </div>

        <div>
            <label>Services Offered:</label>
            <select th:field="*{services}" multiple>
                <option th:each="service : ${serviceTypes}"
                        th:value="${service}"
                        th:text="${service.name()}"></option>
            </select>
        </div>

        <input type="hidden" th:field="*{latitude}" />
        <input type="hidden" th:field="*{longitude}" />

        <button type="submit">Save Changes</button>
        <a th:href="@{/garages/{id}(id=${garageId})}">Cancel</a>

    </form>
</div>

</body>
</html>
