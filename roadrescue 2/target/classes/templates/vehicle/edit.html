<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Vehicle | RoadRescue</title>
    <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-light">
<th:block th:replace="~{layout :: navbar}"></th:block>

<div class="container my-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="d-flex align-items-center mb-4 gap-2">
                <a th:href="@{/vehicles}" class="btn btn-outline-secondary btn-sm">
                    <i class="fas fa-arrow-left"></i>
                </a>
                <h5 class="mb-0 fw-bold"><i class="fas fa-edit text-warning me-2"></i>Edit Vehicle</h5>
            </div>

            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <form th:action="@{/vehicles/{id}/edit(id=${vehicle.id})}" th:object="${vehicle}"
                          method="post" novalidate>
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Vehicle Type *</label>
                            <select th:field="*{vehicleType}" class="form-select"
                                    th:classappend="${#fields.hasErrors('vehicleType')} ? 'is-invalid'">
                                <option value="Car">Car</option>
                                <option value="Van">Van</option>
                                <option value="Truck">Truck</option>
                                <option value="Bike">Bike (Motorcycle)</option>
                                <option value="Bus">Bus</option>
                            </select>
                            <div class="invalid-feedback" th:errors="*{vehicleType}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Brand *</label>
                            <input type="text" th:field="*{brand}" class="form-control"
                                   th:classappend="${#fields.hasErrors('brand')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:errors="*{brand}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Model *</label>
                            <input type="text" th:field="*{model}" class="form-control"
                                   th:classappend="${#fields.hasErrors('model')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:errors="*{model}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Plate Number</label>
                            <input type="text" th:field="*{plateNumber}" class="form-control" readonly
                                   style="background:#f8f9fa">
                            <small class="text-muted">Plate number cannot be changed.</small>
                        </div>

                        <div class="row g-3 mb-4">
                            <div class="col-6">
                                <label class="form-label fw-semibold">Year</label>
                                <input type="number" th:field="*{year}" class="form-control" min="1990" max="2025">
                            </div>
                            <div class="col-6">
                                <label class="form-label fw-semibold">Color</label>
                                <input type="text" th:field="*{color}" class="form-control">
                            </div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-warning flex-fill">
                                <i class="fas fa-save me-2"></i>Save Changes
                            </button>
                            <a th:href="@{/vehicles}" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block th:replace="~{layout :: footer}"></th:block>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
