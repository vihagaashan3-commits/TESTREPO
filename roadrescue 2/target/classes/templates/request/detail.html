<!-- ✅ PAYMENT SECTION -->
<!-- Garage Owner: Create payment when COMPLETED and no payment yet -->
<div class="card border-0 shadow-sm mb-4"
     sec:authorize="hasAnyRole('GARAGE_OWNER','ADMIN')"
     th:if="${request.status.name() == 'COMPLETED' and payment == null}">
    <div class="card-header bg-white fw-bold">
        <i class="fas fa-credit-card text-success me-2"></i>Create Payment
    </div>
    <div class="card-body">
        <form th:action="@{/payments/request/{id}/create(id=${request.id})}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="mb-3">
                <label class="form-label fw-semibold">Amount (Rs.)</label>
                <input type="number" name="amount" step="0.01" min="0.01"
                       class="form-control" required placeholder="e.g. 2500.00"/>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Payment Method</label>
                <select name="method" class="form-select" required>
                    <option value="">Select method</option>
                    <option value="CASH">Cash</option>
                    <option value="CARD">Card</option>
                    <option value="ONLINE">Online Transfer</option>
                </select>
            </div>
            <button type="submit" class="btn btn-success w-100">
                <i class="fas fa-paper-plane me-2"></i>Create Payment Record
            </button>
        </form>
    </div>
</div>

<!-- Payment details: shown to everyone if payment exists -->
<div class="card border-0 shadow-sm mb-4" th:if="${payment != null}">
    <div class="card-header bg-white fw-bold">
        <i class="fas fa-receipt text-success me-2"></i>Payment
        <span th:class="${'badge ms-2 ' +
                        (payment.status.name() == 'PAID'     ? 'bg-success' :
                         payment.status.name() == 'PENDING'  ? 'bg-warning text-dark' :
                         payment.status.name() == 'FAILED'   ? 'bg-danger' : 'bg-secondary')}"
              th:text="${payment.status}">Status</span>
    </div>
    <div class="card-body">
        <table class="table table-borderless mb-0 small">
            <tr>
                <td class="text-muted fw-semibold">Amount</td>
                <td class="fw-bold text-success" th:text="'Rs. ' + ${payment.amount}">—</td>
            </tr>
            <tr>
                <td class="text-muted fw-semibold">Method</td>
                <td th:text="${payment.paymentMethod}">—</td>
            </tr>
            <tr th:if="${payment.paidAt != null}">
                <td class="text-muted fw-semibold">Paid At</td>
                <td th:text="${#temporals.format(payment.paidAt, 'dd MMM yyyy, HH:mm')}">—</td>
            </tr>
        </table>

        <!-- Confirm payment button (Garage Owner / Admin only, if still PENDING) -->
        <form th:if="${payment.status.name() == 'PENDING'}"
              th:action="@{/payments/{id}/confirm(id=${payment.id})}" method="post"
              sec:authorize="hasAnyRole('GARAGE_OWNER','ADMIN')" class="mt-3">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn btn-success w-100">
                <i class="fas fa-check-circle me-2"></i>Confirm Payment Received
            </button>
        </form>
    </div>
</div>
