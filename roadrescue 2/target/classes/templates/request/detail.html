<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <title>Request Details | RoadRescue</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <style>
        #map { height: 300px; border-radius: 12px; z-index: 0; }
        .status-tracker { display: flex; justify-content: space-between; position: relative; }
        .status-tracker::before {
            content: ''; position: absolute; top: 20px; left: 10%; right: 10%;
            height: 3px; background: #dee2e6; z-index: 0;
        }
        .status-step { text-align: center; z-index: 1; }
        .status-dot {
            width: 40px; height: 40px; border-radius: 50%; border: 3px solid #dee2e6;
            background: white; display: flex; align-items: center; justify-content: center;
            margin: 0 auto 8px; font-size: 1rem;
        }
        .status-dot.active { border-color: #dc3545; background: #dc3545; color: white; }
        .status-dot.done   { border-color: #198754; background: #198754; color: white; }
    </style>
</head>
<body class="bg-light">

<th:block th:replace="~{layout :: navbar}"></th:block>

<div class="container my-4">
    <div class="d-flex align-items-center mb-4 gap-2">
        <a th:href="@{/requests}" class="btn btn-outline-secondary btn-sm">
            <i class="fas fa-arrow-left"></i>
        </a>
        <h5 class="mb-0 fw-bold">Request #<span th:text="${request.id}"></span></h5>
        <span th:class="${'badge ms-2 ' +
            (request.status.name() == 'PENDING'     ? 'bg-warning text-dark' :
             request.status.name() == 'ACCEPTED'    ? 'bg-info' :
             request.status.name() == 'IN_PROGRESS' ? 'bg-primary' :
             request.status.name() == 'COMPLETED'   ? 'bg-success' : 'bg-danger')}"
              th:text="${request.status}">Status</span>
    </div>

    <!-- Status Tracker -->
    <div class="card border-0 shadow-sm mb-4">
        <div class="card-body py-4">
            <div class="status-tracker">
                <div class="status-step">
                    <div th:class="${'status-dot ' + (request.status.name() != 'CANCELLED' ? 'done' : '')}">
                        <i class="fas fa-check"></i>
                    </div>
                    <small class="text-muted">Submitted</small>
                </div>
                <div class="status-step">
                    <div th:class="${'status-dot ' +
                        (request.status.name() == 'ACCEPTED' ? 'active' :
                        (request.status.name() == 'IN_PROGRESS' or request.status.name() == 'COMPLETED' ? 'done' : ''))}">
                        <i class="fas fa-warehouse"></i>
                    </div>
                    <small class="text-muted">Accepted</small>
                </div>
                <div class="status-step">
                    <div th:class="${'status-dot ' +
                        (request.status.name() == 'IN_PROGRESS' ? 'active' :
                        (request.status.name() == 'COMPLETED' ? 'done' : ''))}">
                        <i class="fas fa-tools"></i>
                    </div>
                    <small class="text-muted">In Progress</small>
                </div>
                <div class="status-step">
                    <div th:class="${'status-dot ' + (request.status.name() == 'COMPLETED' ? 'done' : '')}">
                        <i class="fas fa-check-double"></i>
                    </div>
                    <small class="text-muted">Completed</small>
                </div>
            </div>
        </div>
    </div>

    <div class="row g-4">
        <!-- Left: Details + Actions -->
        <div class="col-lg-5">

            <!-- Request Info -->
            <div class="card border-0 shadow-sm mb-4">
                <div class="card-header bg-white fw-bold">
                    <i class="fas fa-info-circle text-danger me-2"></i>Request Details
                </div>
                <div class="card-body">
                    <table class="table table-borderless mb-0 small">
                        <tr>
                            <td class="text-muted fw-semibold">Service</td>
                            <td>
                                <span class="badge bg-secondary"
                                      th:text="${#strings.replace(request.serviceType.name(), '_', ' ')}"></span>
                            </td>
                        </tr>
                        <tr>
                            <td class="text-muted fw-semibold">Description</td>
                            <td th:text="${request.description}">—</td>
                        </tr>
                        <tr th:if="${request.vehicle != null}">
                            <td class="text-muted fw-semibold">Vehicle</td>
                            <td th:text="${request.vehicle.brand + ' ' + request.vehicle.model + ' (' + request.vehicle.plateNumber + ')'}">—</td>
                        </tr>
                        <tr>
                            <td class="text-muted fw-semibold">Location</td>
                            <td th:text="${request.locationAddress != null ? request.locationAddress : 'GPS: ' + request.latitude + ', ' + request.longitude}">—</td>
                        </tr>
                        <tr>
                            <td class="text-muted fw-semibold">Submitted</td>
                            <td th:text="${#temporals.format(request.createdAt, 'dd MMM yyyy, HH:mm')}">—</td>
                        </tr>
                        <tr th:if="${request.garage != null}">
                            <td class="text-muted fw-semibold">Garage</td>
                            <td>
                                <a th:href="@{/garages/{id}(id=${request.garage.id})}"
                                   th:text="${request.garage.garageName}" class="text-danger fw-semibold">—</a>
                            </td>
                        </tr>
                        <tr>
                            <td class="text-muted fw-semibold">Customer</td>
                            <td th:text="${request.user.fullName}">—</td>
                        </tr>
                    </table>
                </div>
            </div>

            <!-- ✅ GARAGE OWNER ONLY: Accept / In Progress / Complete buttons -->
            <div class="card border-0 shadow-sm mb-4"
                 sec:authorize="hasRole('GARAGE_OWNER')"
                 th:if="${request.status.name() != 'COMPLETED' and request.status.name() != 'CANCELLED'}">
                <div class="card-header bg-white fw-bold">
                    <i class="fas fa-cog text-warning me-2"></i>Update Status
                </div>
                <div class="card-body d-grid gap-2">
                    <form th:if="${request.status.name() == 'PENDING'}"
                          th:action="@{/garage-owner/requests/{id}/accept(id=${request.id})}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button class="btn btn-success w-100">
                            <i class="fas fa-check me-2"></i>Accept Request
                        </button>
                    </form>
                    <form th:if="${request.status.name() == 'ACCEPTED'}"
                          th:action="@{/garage-owner/requests/{id}/in-progress(id=${request.id})}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button class="btn btn-primary w-100">
                            <i class="fas fa-tools me-2"></i>Mark In Progress
                        </button>
                    </form>
                    <form th:if="${request.status.name() == 'IN_PROGRESS'}"
                          th:action="@{/garage-owner/requests/{id}/complete(id=${request.id})}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button class="btn btn-success w-100">
                            <i class="fas fa-flag-checkered me-2"></i>Mark Completed
                        </button>
                    </form>
                </div>
            </div>

            <!-- ✅ USER ONLY: Cancel button -->
            <div th:if="${request.status.name() == 'PENDING'}" sec:authorize="hasRole('USER')">
                <form th:action="@{/requests/{id}/cancel(id=${request.id})}" method="post"
                      onsubmit="return confirm('Are you sure you want to cancel this request?')">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-outline-danger w-100">
                        <i class="fas fa-times me-2"></i>Cancel Request
                    </button>
                </form>
            </div>

            <!-- ✅ ADMIN ONLY: View only notice -->
            <div sec:authorize="hasRole('ADMIN')" class="alert alert-secondary">
                <i class="fas fa-eye me-2"></i>Admin view — read only
            </div>
        </div>

        <!-- Right: Map + Nearby Garages -->
        <div class="col-lg-7">
            <!-- ✅ OpenStreetMap (Free - No API Key needed) -->
            <div class="card border-0 shadow-sm mb-4">
                <div class="card-header bg-white fw-bold">
                    <i class="fas fa-map-marker-alt text-danger me-2"></i>Your Location
                </div>
                <div class="card-body p-2">
                    <div id="map"></div>
                </div>
            </div>

            <!-- Nearby Garages -->
            <div class="card border-0 shadow-sm"
                 th:if="${request.status.name() == 'PENDING' and nearbyGarages != null and !nearbyGarages.isEmpty()}">
                <div class="card-header bg-white fw-bold">
                    <i class="fas fa-warehouse text-warning me-2"></i>
                    Nearby Garages (<span th:text="${#lists.size(nearbyGarages)}"></span> found)
                </div>
                <div class="list-group list-group-flush">
                    <div class="list-group-item" th:each="garage : ${nearbyGarages}">
                        <div class="d-flex justify-content-between align-items-start">
                            <div>
                                <div class="fw-semibold" th:text="${garage.garageName}">Garage</div>
                                <small class="text-muted">
                                    <i class="fas fa-map-marker-alt me-1"></i>
                                    <span th:text="${garage.address}">Address</span>
                                </small><br>
                                <small class="text-muted">
                                    <i class="fas fa-phone me-1"></i>
                                    <span th:text="${garage.phone}">Phone</span>
                                </small>
                            </div>
                            <a th:href="@{/garages/{id}(id=${garage.id})}"
                               class="btn btn-sm btn-outline-danger">View</a>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Real-time update banner -->
            <div id="wsAlert" class="alert alert-info mt-3 d-none">
                <i class="fas fa-satellite-dish me-2"></i>
                <span id="wsMessage">Waiting for updates...</span>
            </div>
        </div>
    </div>
</div>

<th:block th:replace="~{layout :: footer}"></th:block>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>

<script th:inline="javascript">
    // ✅ OpenStreetMap with Leaflet (no API key needed)
    const requestLat = /*[[${request.latitude}]]*/ 6.9271;
    const requestLng = /*[[${request.longitude}]]*/ 79.8612;
    const garages    = /*[[${nearbyGarages}]]*/ [];

    const map = L.map('map').setView([requestLat, requestLng], 14);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    // User location marker (red)
    L.marker([requestLat, requestLng])
        .addTo(map)
        .bindPopup('<b>Your Location</b>')
        .openPopup();

    // Nearby garage markers (blue)
    if (garages && garages.length > 0) {
        garages.forEach(g => {
            if (g.latitude && g.longitude) {
                L.marker([g.latitude, g.longitude], {
                    icon: L.icon({
                        iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-blue.png',
                        iconSize: [25, 41], iconAnchor: [12, 41]
                    })
                }).addTo(map).bindPopup('<b>' + g.garageName + '</b><br>' + g.address);
            }
        });
    }

    // WebSocket for real-time status updates
    try {
        const socket = new SockJS('/ws');
        const stompClient = Stomp.over(socket);
        stompClient.connect({}, () => {
            stompClient.subscribe('/user/queue/request-update', msg => {
                document.getElementById('wsAlert').classList.remove('d-none');
                document.getElementById('wsMessage').textContent = 'Status updated! Refreshing...';
                setTimeout(() => location.reload(), 2000);
            });
        });
    } catch(e) { console.log('WebSocket not available'); }
</script>
</body>
</html>
