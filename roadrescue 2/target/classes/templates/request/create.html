<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <title>Request Help | RoadRescue</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <style>
        #map { height: 350px; border-radius: 12px; }
        .service-card { cursor: pointer; transition: all 0.2s; border: 2px solid transparent; }
        .service-card:hover { border-color: #dc3545; transform: translateY(-2px); }
        .service-card.selected { border-color: #dc3545; background: #fff5f5; }
        .service-icon { font-size: 2rem; }
    </style>
</head>
<body class="bg-light">

<th:block th:replace="~{layout :: navbar}"></th:block>

<div class="container my-4">
    <div class="row justify-content-center">
        <div class="col-lg-10">

            <!-- Header -->
            <div class="rr-hero rounded-3 p-4 mb-4 text-white text-center">
                <h4><i class="fas fa-exclamation-triangle me-2"></i>Request Emergency Assistance</h4>
                <p class="mb-0 opacity-75">Tell us what's wrong and we'll find help near you</p>
            </div>

            <form th:action="@{/requests/new}" th:object="${requestDTO}" method="post" novalidate>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div class="row g-4">
                    <!-- Left: Problem & Vehicle -->
                    <div class="col-lg-5">

                        <!-- Problem Type -->
                        <div class="card border-0 shadow-sm mb-4">
                            <div class="card-header bg-white fw-bold">
                                <i class="fas fa-tools text-danger me-2"></i>What's the Problem?
                            </div>
                            <div class="card-body">
                                <input type="hidden" th:field="*{serviceType}" id="serviceTypeInput">
                                <div th:if="${#fields.hasErrors('serviceType')}"
                                     class="alert alert-danger py-2 small" th:errors="*{serviceType}"></div>

                                <div class="row g-2">
                                    <div class="col-6" th:each="svc : ${serviceTypes}">
                                        <div class="card service-card text-center p-2"
                                             th:data-value="${svc.name()}"
                                             onclick="selectService(this)">
                                            <div class="service-icon">
                                                <i th:class="${
                                                    svc.name() == 'FLAT_TIRE' ? 'fas fa-circle-dot text-danger' :
                                                    svc.name() == 'BATTERY_JUMP' ? 'fas fa-bolt text-warning' :
                                                    svc.name() == 'BATTERY_REPLACEMENT' ? 'fas fa-car-battery text-info' :
                                                    svc.name() == 'ENGINE_REPAIR' ? 'fas fa-cog text-secondary' :
                                                    svc.name() == 'FUEL_DELIVERY' ? 'fas fa-gas-pump text-success' :
                                                    svc.name() == 'TOWING' ? 'fas fa-truck-moving text-primary' :
                                                    svc.name() == 'BRAKE_REPAIR' ? 'fas fa-stop-circle text-danger' :
                                                    svc.name() == 'LOCKOUT' ? 'fas fa-key text-warning' :
                                                    'fas fa-wrench text-secondary'}"></i>
                                            </div>
                                            <small th:text="${#strings.replace(svc.name(), '_', ' ')}">Service</small>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Description -->
                        <div class="card border-0 shadow-sm mb-4">
                            <div class="card-header bg-white fw-bold">
                                <i class="fas fa-comment-alt text-danger me-2"></i>Describe the Issue
                            </div>
                            <div class="card-body">
                                <textarea th:field="*{description}" rows="3" class="form-control"
                                          th:classappend="${#fields.hasErrors('description')} ? 'is-invalid'"
                                          placeholder="e.g. Front left tyre completely flat, can't move..."></textarea>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('description')}"
                                     th:errors="*{description}"></div>
                            </div>
                        </div>

                        <!-- Vehicle -->
                        <div class="card border-0 shadow-sm">
                            <div class="card-header bg-white fw-bold">
                                <i class="fas fa-car text-danger me-2"></i>Select Your Vehicle (Optional)
                            </div>
                            <div class="card-body">
                                <select th:field="*{vehicleId}" class="form-select">
                                    <option value="">-- Select vehicle --</option>
                                    <option th:each="v : ${userVehicles}"
                                            th:value="${v.id}"
                                            th:text="${v.brand + ' ' + v.model + ' (' + v.plateNumber + ')'}">Vehicle</option>
                                </select>
                                <div class="mt-2">
                                    <a th:href="@{/vehicles/new}" class="btn btn-sm btn-outline-secondary">
                                        <i class="fas fa-plus me-1"></i>Add Vehicle
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Right: Map & Location -->
                    <div class="col-lg-7">
                        <div class="card border-0 shadow-sm">
                            <div class="card-header bg-white fw-bold d-flex justify-content-between align-items-center">
                                <span><i class="fas fa-map-marker-alt text-danger me-2"></i>Your Location</span>
                                <button type="button" class="btn btn-sm btn-outline-danger" onclick="getLocation()">
                                    <i class="fas fa-crosshairs me-1"></i>Use My Location
                                </button>
                            </div>
                            <div class="card-body">
                                <div id="map" class="mb-3"></div>

                                <input type="hidden" th:field="*{latitude}" id="latInput">
                                <input type="hidden" th:field="*{longitude}" id="lngInput">

                                <div class="mb-3">
                                    <label class="form-label small fw-semibold">Address / Landmark</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="fas fa-map-pin"></i></span>
                                        <input type="text" th:field="*{locationAddress}" class="form-control"
                                               placeholder="e.g. Near Keells, Galle Road, Colombo 3"
                                               id="addressInput">
                                    </div>
                                </div>

                                <div th:if="${#fields.hasErrors('latitude')}"
                                     class="alert alert-danger py-2 small">Please share your location.</div>

                                <div class="alert alert-info py-2 small">
                                    <i class="fas fa-info-circle me-1"></i>
                                    Click "Use My Location" or click on the map to set your position.
                                </div>

                                <div class="d-grid">
                                    <button type="submit" class="btn btn-danger btn-lg">
                                        <i class="fas fa-paper-plane me-2"></i>Send Emergency Request
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

<th:block th:replace="~{layout :: footer}"></th:block>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- Google Maps -->
<script>
    let map, marker;

    function initMap() {
        const defaultPos = { lat: 6.9271, lng: 79.8612 }; // Colombo default
        map = new google.maps.Map(document.getElementById('map'), {
            zoom: 13, center: defaultPos,
            styles: [{ featureType: 'poi', stylers: [{ visibility: 'simplified' }] }]
        });
        map.addListener('click', (e) => placeMarker(e.latLng.lat(), e.latLng.lng()));
        getLocation();
    }

    function getLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
                placeMarker(pos.coords.latitude, pos.coords.longitude);
            }, () => alert('Location access denied. Please click on the map.'));
        }
    }

    function placeMarker(lat, lng) {
        document.getElementById('latInput').value = lat;
        document.getElementById('lngInput').value = lng;
        const pos = { lat, lng };
        map.setCenter(pos);
        map.setZoom(15);
        if (marker) marker.setMap(null);
        marker = new google.maps.Marker({ position: pos, map, animation: google.maps.Animation.DROP,
            icon: { url: 'https://maps.google.com/mapfiles/ms/icons/red-dot.png' }
        });
        // Reverse geocode
        const geocoder = new google.maps.Geocoder();
        geocoder.geocode({ location: pos }, (results, status) => {
            if (status === 'OK' && results[0]) {
                document.getElementById('addressInput').value = results[0].formatted_address;
            }
        });
    }

    function selectService(card) {
        document.querySelectorAll('.service-card').forEach(c => c.classList.remove('selected'));
        card.classList.add('selected');
        document.getElementById('serviceTypeInput').value = card.dataset.value;
    }
</script>
<script th:src="@{'https://maps.googleapis.com/maps/api/js?key=' + ${@environment.getProperty('google.maps.api.key')} + '&callback=initMap'}"
        async defer></script>
</body>
</html>
