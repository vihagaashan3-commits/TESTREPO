<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title>Unread Notifications | RoadRescue</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-light">
<th:block th:replace="~{layout :: navbar}"></th:block>

<div class="container my-4">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h5 class="fw-bold mb-0 text-dark">
            <i class="fas fa-bell text-danger me-2"></i>Unread Notifications
            <span th:if="${notifications != null and !notifications.isEmpty()}"
                  class="badge bg-danger ms-2" th:text="${#lists.size(notifications)}">0</span>
        </h5>
        <div class="d-flex gap-2">
            <!-- Mark all read -->
            <form th:action="@{/notifications/read-all}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-outline-secondary btn-sm"
                        th:disabled="${notifications == null or notifications.isEmpty()}">
                    <i class="fas fa-check-double me-1"></i>Mark All Read
                </button>
            </form>
            <!-- View all -->
            <a th:href="@{/notifications}" class="btn btn-outline-secondary btn-sm">
                <i class="fas fa-list me-1"></i>View All
            </a>
        </div>
    </div>

    <!-- Notifications List -->
    <div class="card border-0 shadow-sm" th:if="${notifications != null and !notifications.isEmpty()}">
        <div class="list-group list-group-flush">
            <div th:each="n : ${notifications}"
                 class="list-group-item list-group-item-action py-3 border-start border-danger border-3"
                 th:id="'notification-' + ${n.id}">
                <div class="d-flex justify-content-between align-items-start">
                    <div class="d-flex gap-3">
                        <!-- Icon -->
                        <div th:class="${'rounded-circle d-flex align-items-center justify-content-center flex-shrink-0 ' +
                            (n.notificationType == 'REQUEST_ACCEPTED' ? 'bg-success' :
                             n.notificationType == 'PAYMENT_SUCCESS' ? 'bg-warning' :
                             n.notificationType == 'PAYMENT_CREATED' ? 'bg-info' : 'bg-secondary') + ' text-white'}"
                             style="width:42px;height:42px;">
                            <i th:class="${n.notificationType == 'REQUEST_ACCEPTED' ? 'fas fa-check' :
                                          n.notificationType == 'PAYMENT_SUCCESS' ? 'fas fa-dollar-sign' :
                                          n.notificationType == 'PAYMENT_CREATED' ? 'fas fa-file-invoice' :
                                          'fas fa-bell'}"></i>
                        </div>
                        <!-- Content -->
                        <div>
                            <div class="fw-semibold" th:text="${n.title}">Title</div>
                            <div class="small text-muted" th:text="${n.message}">Message</div>
                            <div th:if="${n.breakdownRequest != null}" class="mt-1">
                                <a th:href="@{/requests/{id}(id=${n.breakdownRequest.id})}"
                                   class="btn btn-sm btn-outline-danger py-0 px-2">
                                    View Request #<span th:text="${n.breakdownRequest.id}"></span>
                                </a>
                            </div>
                        </div>
                    </div>
                    <!-- Right side -->
                    <div class="text-end flex-shrink-0 ms-3">
                        <small class="text-muted d-block"
                               th:text="${#temporals.format(n.createdAt, 'dd MMM, HH:mm')}">Date</small>
                        <span class="badge bg-danger mt-1">New</span>
                        <!-- Mark single as read -->
                        <button class="btn btn-sm btn-outline-secondary mt-1 mark-read-btn"
                                th:data-id="${n.id}">
                            <i class="fas fa-check"></i> Read
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Empty state -->
    <div th:if="${notifications == null or notifications.isEmpty()}"
         class="text-center py-5">
        <i class="fas fa-check-circle fs-1 d-block mb-3 text-success opacity-75"></i>
        <h6 class="text-dark">No unread notifications</h6>
        <p class="text-muted small">You're all caught up! Nothing new to see here.</p>
        <a th:href="@{/notifications}" class="btn btn-outline-light btn-sm mt-2">
            <i class="fas fa-list me-1"></i>View All Notifications
        </a>
    </div>

</div>

<th:block th:replace="~{layout :: footer}"></th:block>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    const csrfToken = document.querySelector('meta[name="_csrf"]').content;
    const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;

    document.querySelectorAll('.mark-read-btn').forEach(btn => {
        btn.addEventListener('click', function () {
            const id = this.dataset.id;
            fetch(`/notifications/${id}/read`, {
                method: 'POST',
                headers: { [csrfHeader]: csrfToken }
            }).then(() => {
                const item = document.getElementById('notification-' + id);
                item.style.transition = 'opacity 0.4s ease';
                item.style.opacity = '0';
                setTimeout(() => item.remove(), 400);
            });
        });
    });
</script>
</body>
</html>
