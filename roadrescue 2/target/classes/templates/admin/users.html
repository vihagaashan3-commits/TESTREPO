<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Users | RoadRescue</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-light">
<th:block th:replace="~{layout :: navbar}"></th:block>

<div class="container-fluid my-4">
    <div class="row">
        <!-- Sidebar -->
        <div class="col-md-2">
            <div class="card border-0 shadow-sm">
                <div class="list-group list-group-flush rounded">
                    <a th:href="@{/dashboard}" class="list-group-item list-group-item-action">
                        <i class="fas fa-tachometer-alt me-2"></i>Dashboard
                    </a>
                    <a th:href="@{/admin/users}" class="list-group-item list-group-item-action active bg-danger text-white">
                        <i class="fas fa-users me-2"></i>Users
                    </a>
                    <a th:href="@{/admin/garages}" class="list-group-item list-group-item-action">
                        <i class="fas fa-warehouse me-2"></i>Garages
                    </a>
                    <a th:href="@{/requests/all}" class="list-group-item list-group-item-action">
                        <i class="fas fa-clipboard-list me-2"></i>Requests
                    </a>
                </div>
            </div>
        </div>

        <!-- Main -->
        <div class="col-md-10">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h5 class="fw-bold mb-0"><i class="fas fa-users text-danger me-2"></i>Manage Users</h5>
            </div>

            <!-- Flash -->
            <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
                <i class="fas fa-check-circle me-2"></i><span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <!-- Search -->
            <div class="card border-0 shadow-sm mb-4">
                <div class="card-body py-3">
                    <form th:action="@{/admin/users}" method="get" class="d-flex gap-2">
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-search"></i></span>
                            <input type="text" name="keyword" th:value="${keyword}"
                                   class="form-control" placeholder="Search by name or email...">
                        </div>
                        <button type="submit" class="btn btn-danger px-4">Search</button>
                        <a th:href="@{/admin/users}" class="btn btn-outline-secondary">Clear</a>
                    </form>
                </div>
            </div>

            <div class="card border-0 shadow-sm">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                            <tr>
                                <th>#</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Phone</th>
                                <th>Role</th>
                                <th>Status</th>
                                <th>Joined</th>
                                <th>Actions</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="u : ${users}">
                                <td th:text="${u.id}"></td>
                                <td class="fw-semibold" th:text="${u.fullName}">Name</td>
                                <td th:text="${u.email}">Email</td>
                                <td th:text="${u.phone}">Phone</td>
                                <td>
                                    <span th:class="${'badge ' +
                                        (u.role.name() == 'ROLE_ADMIN' ? 'bg-danger' :
                                         u.role.name() == 'ROLE_GARAGE_OWNER' ? 'bg-warning text-dark' : 'bg-secondary')}"
                                          th:text="${#strings.replace(u.role.name(), 'ROLE_', '')}">Role</span>
                                </td>
                                <td>
                                    <span th:class="${u.active ? 'badge bg-success' : 'badge bg-danger'}"
                                          th:text="${u.active ? 'Active' : 'Inactive'}">Status</span>
                                </td>
                                <td><small th:text="${#temporals.format(u.createdAt, 'dd MMM yyyy')}"></small></td>
                                <td>
                                    <form th:action="@{/admin/users/{id}/toggle(id=${u.id})}" method="post" class="d-inline">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                        <button type="submit" th:class="${'btn btn-sm me-1 ' + (u.active ? 'btn-outline-warning' : 'btn-outline-success')}"
                                                th:title="${u.active ? 'Deactivate' : 'Activate'}">
                                            <i th:class="${u.active ? 'fas fa-ban' : 'fas fa-check'}"></i>
                                        </button>
                                    </form>
                                    <form th:action="@{/admin/users/{id}/delete(id=${u.id})}" method="post" class="d-inline"
                                          onsubmit="return confirm('Delete this user?')">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                        <button type="submit" class="btn btn-sm btn-outline-danger">
                                            <i class="fas fa-trash"></i>
                                        </button>
                                    </form>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Pagination -->
                <div class="card-footer bg-white" th:if="${users.totalPages > 1}">
                    <nav>
                        <ul class="pagination pagination-sm justify-content-center mb-0">
                            <li class="page-item" th:classappend="${users.first} ? 'disabled'">
                                <a class="page-link" th:href="@{/admin/users(page=${currentPage - 1}, keyword=${keyword})}">
                                    <i class="fas fa-chevron-left"></i>
                                </a>
                            </li>
                            <li class="page-item" th:each="i : ${#numbers.sequence(0, users.totalPages - 1)}"
                                th:classappend="${i == currentPage} ? 'active'">
                                <a class="page-link" th:href="@{/admin/users(page=${i}, keyword=${keyword})}"
                                   th:text="${i + 1}">1</a>
                            </li>
                            <li class="page-item" th:classappend="${users.last} ? 'disabled'">
                                <a class="page-link" th:href="@{/admin/users(page=${currentPage + 1}, keyword=${keyword})}">
                                    <i class="fas fa-chevron-right"></i>
                                </a>
                            </li>
                        </ul>
                    </nav>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block th:replace="~{layout :: footer}"></th:block>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
