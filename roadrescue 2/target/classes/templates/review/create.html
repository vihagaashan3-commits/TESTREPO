<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Write a Review | RoadRescue</title>
    <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <style>
        .star-btn { font-size: 2rem; cursor: pointer; color: #dee2e6; transition: color 0.15s; background: none; border: none; }
        .star-btn.active, .star-btn:hover { color: #ffc107; }
    </style>
</head>
<body class="bg-light">
<th:block th:replace="~{layout :: navbar}"></th:block>

<div class="container my-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="d-flex align-items-center mb-4 gap-2">
                <a th:href="@{/garages/{id}(id=${garageId})}" class="btn btn-outline-secondary btn-sm">
                    <i class="fas fa-arrow-left"></i>
                </a>
                <h5 class="mb-0 fw-bold"><i class="fas fa-star text-warning me-2"></i>Write a Review</h5>
            </div>

            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <div th:if="${error}" class="alert alert-danger mb-3" th:text="${error}"></div>

                    <form th:action="@{/reviews/garage/{id}(id=${garageId})}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                        <!-- Star Rating -->
                        <div class="mb-4 text-center">
                            <label class="form-label fw-semibold d-block">Your Rating *</label>
                            <div id="starRow">
                                <button type="button" class="star-btn" data-val="1">★</button>
                                <button type="button" class="star-btn" data-val="2">★</button>
                                <button type="button" class="star-btn" data-val="3">★</button>
                                <button type="button" class="star-btn" data-val="4">★</button>
                                <button type="button" class="star-btn" data-val="5">★</button>
                            </div>
                            <input type="hidden" name="rating" id="ratingInput" required>
                            <div id="ratingLabel" class="small text-muted mt-1">Click to rate</div>
                        </div>

                        <!-- Comment -->
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Your Comment *</label>
                            <textarea name="comment" rows="4" class="form-control"
                                      placeholder="Share your experience with this garage..."
                                      minlength="5" maxlength="500" required></textarea>
                        </div>

                        <button type="submit" class="btn btn-warning w-100 fw-bold">
                            <i class="fas fa-paper-plane me-2"></i>Submit Review
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block th:replace="~{layout :: footer}"></th:block>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const labels = ['', 'Poor', 'Fair', 'Good', 'Very Good', 'Excellent'];
    const stars = document.querySelectorAll('.star-btn');
    const input = document.getElementById('ratingInput');
    const label = document.getElementById('ratingLabel');

    stars.forEach(btn => {
        btn.addEventListener('click', () => {
            const val = parseInt(btn.dataset.val);
            input.value = val;
            label.textContent = labels[val];
            stars.forEach(s => s.classList.toggle('active', parseInt(s.dataset.val) <= val));
        });
        btn.addEventListener('mouseenter', () => {
            const val = parseInt(btn.dataset.val);
            stars.forEach(s => s.style.color = parseInt(s.dataset.val) <= val ? '#ffc107' : '#dee2e6');
        });
        btn.addEventListener('mouseleave', () => {
            const cur = parseInt(input.value) || 0;
            stars.forEach(s => s.style.color = parseInt(s.dataset.val) <= cur ? '#ffc107' : '#dee2e6');
        });
    });
</script>
</body>
</html>
